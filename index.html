<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1715">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reframe">
<title>Reframe — A CBT Journal</title>
<meta name="description" content="A private, offline-first CBT journal. Capture thoughts, identify distortions, reframe them. All data stays on your device.">

<!-- PWA manifest + icons. IDs let js/pwa.js swap to inline blob URLs when
     the app is opened from file:// (where external manifest fetch fails). -->
<link rel="manifest" href="manifest.json" id="pwa-manifest">
<link rel="apple-touch-icon" href="icons/icon-192.svg" id="pwa-apple-icon">
<link rel="icon" type="image/svg+xml" href="icons/icon-small.svg" id="pwa-favicon">
<link rel="icon" type="image/svg+xml" sizes="192x192" href="icons/icon-192.svg">
<link rel="icon" type="image/svg+xml" sizes="512x512" href="icons/icon-512.svg">

<!-- PWA bootstrap: service worker registration + install prompt + file:// fallback -->
<script src="js/pwa.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ──────────────────────────────────────────────────────────────────
   TOKENS
   ────────────────────────────────────────────────────────────────── */
:root {
  --ink:        #1a1715;
  --ink-2:      #221e1b;
  --ink-3:      #2a2521;
  --ink-4:      #36302a;
  --paper:      #f5efe6;
  --paper-2:    #ebe3d5;
  --paper-3:    #ddd0b8;
  --paper-4:    #c9b896;

  --on-ink:        #f5efe6;
  --on-ink-soft:   #c9bdac;
  --on-ink-mute:   #8a7d6c;
  --on-ink-faint:  #5a4f43;

  --on-paper:        #1a1715;
  --on-paper-soft:   #4a3f33;
  --on-paper-mute:   #6a5a47;
  --on-paper-faint:  #8a7860;

  --copper:        #b8552c;
  --copper-light:  #c46838;
  --copper-deep:   #8c4520;
  --copper-glow:   rgba(184, 85, 44, 0.14);
  --copper-soft:   rgba(184, 85, 44, 0.08);
  --copper-line:   rgba(184, 85, 44, 0.32);

  --rule-paper:    rgba(106, 90, 71, 0.18);
  --rule-paper-2:  rgba(106, 90, 71, 0.32);
  --rule-ink:      rgba(245, 239, 230, 0.08);
  --rule-ink-2:    rgba(245, 239, 230, 0.16);

  --shadow-1: 0 1px 2px rgba(0,0,0,0.25);
  --shadow-2: 0 4px 14px rgba(0,0,0,0.32);
  --shadow-3: 0 12px 36px rgba(0,0,0,0.48);

  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-5: 20px; --sp-6: 24px; --sp-7: 32px; --sp-8: 48px;

  --r-1: 2px; --r-2: 4px; --r-3: 8px; --r-4: 12px; --r-full: 999px;

  --display: 'Fraunces', 'Iowan Old Style', Baskerville, Georgia, serif;
  --body:    'Manrope', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  --mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;

  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);

  --app-max: 720px;
  --nav-h: 68px;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
input, textarea, select { font: inherit; }
:focus-visible { outline: 2px solid var(--copper); outline-offset: 2px; border-radius: var(--r-2); }
::selection { background: var(--copper-glow); color: var(--copper-deep); }

html { -webkit-tap-highlight-color: transparent; }
body {
  background: var(--ink);
  color: var(--on-ink);
  font-family: var(--body);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'kern', 'liga', 'calt';
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
}

.display { font-family: var(--display); letter-spacing: -0.015em; }
.mono    { font-family: var(--mono); }
.italic  { font-style: italic; }

body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  background-image:
    radial-gradient(circle at 18% 22%, rgba(184,85,44,0.045) 0%, transparent 45%),
    radial-gradient(circle at 82% 78%, rgba(184,85,44,0.035) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.015) 0%, transparent 70%);
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
.container {
  max-width: var(--app-max);
  margin: 0 auto;
  padding: 0 20px;
  width: 100%;
}
@media (min-width: 768px) {
  .container { padding: 0 32px; }
}

main {
  flex: 1;
  padding: 0 0 calc(var(--nav-h) + env(safe-area-inset-bottom) + 32px) 0;
}

.topbar {
  padding: 28px 0 24px 0;
  position: relative;
}
@media (min-width: 768px) { .topbar { padding: 36px 0 28px 0; } }

.brand-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.brand-mark {
  font-family: var(--display);
  font-style: italic;
  font-weight: 500;
  font-size: 28px;
  color: var(--copper);
  line-height: 1;
}
.brand-name {
  font-family: var(--display);
  font-weight: 500;
  font-size: 17px;
  letter-spacing: 0.02em;
}
.brand-sub {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--on-ink-mute);
}

.topbar-actions { display: flex; gap: 8px; align-items: center; }
.icon-pill {
  /* 40px hits the Material 48dp touch target once you include the 4px of
     focus-visible outline, and 44px on iOS once you count the brand-row
     vertical padding. Smaller pills made the topbar look elegant on
     desktop but were unreliable to tap on a phone, especially at the
     screen's top edge. */
  width: 40px; height: 40px;
  display: inline-flex;
  align-items: center; justify-content: center;
  border-radius: var(--r-full);
  color: var(--on-ink-soft);
  background: var(--ink-2);
  border: 1px solid var(--rule-ink);
  transition: all 0.15s var(--ease);
  flex-shrink: 0;
}
.icon-pill:hover { color: var(--copper); border-color: var(--copper-line); }
.icon-pill:active { transform: scale(0.96); }
.icon-pill svg { width: 18px; height: 18px; }

.install-pill {
  height: 40px;
  padding: 0 16px;
  display: inline-flex;
  align-items: center; justify-content: center;
  border-radius: var(--r-full);
  color: var(--copper);
  background: var(--copper-soft);
  border: 1px solid var(--copper-line);
  font-family: var(--body);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.01em;
  transition: all 0.15s var(--ease);
  white-space: nowrap;
  flex-shrink: 0;
}
.install-pill:hover { background: var(--copper-glow); border-color: var(--copper); color: var(--copper-light); }
.install-pill:active { transform: scale(0.98); }
.install-pill[hidden] { display: none; }

.page-header {
  margin-bottom: 24px;
}
.page-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--copper);
  margin-bottom: 8px;
}
.page-title {
  font-family: var(--display);
  font-weight: 500;
  font-size: 32px;
  line-height: 1.1;
  letter-spacing: -0.02em;
  margin: 0;
}
@media (min-width: 768px) {
  .page-title { font-size: 40px; }
}
.page-sub {
  margin: 8px 0 0 0;
  font-size: 14px;
  color: var(--on-ink-soft);
  max-width: 480px;
  line-height: 1.6;
}

.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 20;
  padding: 8px 12px calc(8px + env(safe-area-inset-bottom)) 12px;
  background: linear-gradient(to top, var(--ink) 60%, rgba(26,23,21,0.85) 100%);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-top: 1px solid var(--rule-ink);
}
.bottom-nav-inner {
  max-width: var(--app-max);
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 4px;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 10px 6px 8px 6px;
  border-radius: var(--r-3);
  color: var(--on-ink-mute);
  transition: all 0.2s var(--ease);
  position: relative;
}
.nav-item:hover { color: var(--on-ink-soft); }
.nav-item.active { color: var(--copper); }
.nav-item.active::before {
  content: '';
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 24px; height: 2px;
  background: var(--copper);
  border-radius: 0 0 2px 2px;
}
.nav-item svg { width: 20px; height: 20px; stroke-width: 1.6; }
.nav-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 11px 18px;
  border-radius: var(--r-1);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  transition: all 0.18s var(--ease);
  white-space: nowrap;
}
.btn-primary {
  background: var(--copper);
  color: var(--paper);
}
.btn-primary:hover { background: var(--copper-light); transform: translateY(-1px); box-shadow: var(--shadow-2); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

.btn-ghost {
  background: transparent;
  color: var(--on-ink-soft);
  border: 1px solid var(--rule-ink-2);
  padding: 10px 16px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  font-weight: 500;
}
.btn-ghost:hover { color: var(--copper); border-color: var(--copper-line); background: var(--copper-soft); }

.kicker {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--on-ink-mute);
}

.journal-toolbar {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 20px;
}
@media (min-width: 560px) {
  .journal-toolbar { flex-direction: row; align-items: center; }
}
.search-box {
  position: relative;
  flex: 1;
  min-width: 0;
}
.search-box svg {
  position: absolute;
  left: 12px; top: 50%;
  transform: translateY(-50%);
  width: 14px; height: 14px;
  color: var(--on-ink-mute);
}
.search-input {
  width: 100%;
  padding: 11px 12px 11px 36px;
  background: var(--ink-2);
  color: var(--on-ink);
  border: 1px solid var(--rule-ink);
  border-radius: var(--r-2);
  /* 16px font-size to dodge iOS Safari's focus auto-zoom. */
  font-size: 16px;
  outline: none;
  transition: border-color 0.15s var(--ease);
}
.search-input:focus { border-color: var(--copper-line); }
.search-input::placeholder { color: var(--on-ink-faint); }

.filter-chips {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
  margin-bottom: 20px;
}
.filter-chips::-webkit-scrollbar { display: none; }
.filter-chip {
  padding: 6px 12px;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: 1px solid var(--rule-ink-2);
  color: var(--on-ink-soft);
  border-radius: var(--r-full);
  white-space: nowrap;
  transition: all 0.15s var(--ease);
  flex-shrink: 0;
}
.filter-chip:hover { color: var(--copper); border-color: var(--copper-line); }
.filter-chip.active { background: var(--copper); color: var(--paper); border-color: var(--copper); }

.date-group {
  margin-bottom: 28px;
}
.date-group-label {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  padding: 0 4px;
}
.date-group-label .kicker { color: var(--on-ink-mute); font-size: 10px; }
.date-group-rule {
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--rule-ink-2), transparent);
}

.entry-stack { display: flex; flex-direction: column; gap: 12px; }

.entry-card {
  background: var(--paper);
  color: var(--on-paper);
  border-radius: var(--r-2);
  overflow: hidden;
  transition: box-shadow 0.2s var(--ease);
  position: relative;
}
.entry-card:hover { box-shadow: var(--shadow-2); }
.entry-card.expanded { box-shadow: var(--shadow-2); }

.entry-card-head {
  padding: 16px 18px;
  cursor: pointer;
  user-select: none;
}
.entry-meta-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.entry-meta-num {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--copper);
  font-weight: 500;
}
.entry-meta-dot { color: var(--on-paper-faint); font-family: var(--mono); font-size: 10px; }
.entry-meta-time {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--on-paper-faint);
}
.entry-card-trigger {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 500;
  line-height: 1.35;
  margin: 0;
  letter-spacing: -0.01em;
}
.entry-card-trigger.empty { color: var(--on-paper-faint); font-style: italic; }

.entry-tags-row {
  margin-top: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.felt-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 500;
  color: var(--on-paper-soft);
}
.felt-pill .felt-emo { color: var(--on-paper); font-weight: 600; }
.intensity-mini {
  font-family: var(--mono);
  font-size: 9px;
  padding: 1px 6px;
  background: var(--copper-glow);
  color: var(--copper-deep);
  border-radius: var(--r-full);
  font-weight: 600;
}
.dist-chip {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 2px 8px;
  border: 1px solid var(--rule-paper-2);
  color: var(--on-paper-soft);
  border-radius: var(--r-full);
  font-weight: 500;
}
.dist-more {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--on-paper-faint);
}
.pivot-indicator {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 10px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--on-paper-faint);
}
.pivot-indicator.done { color: #4a7c4a; }
.pivot-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
}

.entry-body {
  padding: 0 18px 18px 18px;
  animation: slideDown 0.3s var(--ease-out);
  border-top: 1px solid var(--rule-paper);
  margin-top: 4px;
  padding-top: 16px;
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
.detail-row { margin-bottom: 18px; }
.detail-row:last-child { margin-bottom: 0; }
.detail-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--on-paper-mute);
  margin-bottom: 5px;
}
.detail-text {
  margin: 0;
  font-size: 14px;
  line-height: 1.6;
  color: var(--on-paper);
}
.detail-text.italic { font-style: italic; color: var(--on-paper-soft); }
.detail-text.muted { color: var(--on-paper-mute); }
.evidence-split {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}
@media (min-width: 480px) {
  .evidence-split { grid-template-columns: 1fr 1fr; }
}
.socratic-quote {
  margin-top: 12px;
  padding: 8px 12px;
  border-left: 2px solid var(--copper);
  background: var(--copper-soft);
  border-radius: 0 var(--r-1) var(--r-1) 0;
}
.entry-pivot {
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.entry-pivot-content { flex: 1; min-width: 0; }
.entry-pivot-text { transition: opacity 0.2s, text-decoration-color 0.2s; }
.entry-pivot-text.done { text-decoration: line-through; opacity: 0.55; }
.pivot-toggle-large {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: var(--r-full);
  background: var(--paper-2);
  cursor: pointer;
  transition: background 0.15s var(--ease);
  flex-shrink: 0;
}
.pivot-toggle-large:hover { background: var(--paper-3); }
.pivot-toggle-large input { width: 14px; height: 14px; accent-color: var(--copper); margin: 0; cursor: pointer; }
.pivot-toggle-large span {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--on-paper-mute);
  font-weight: 500;
}
.entry-card-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 18px;
  border-top: 1px solid var(--rule-paper);
  background: var(--paper-2);
}
.entry-card-actions-time {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  color: var(--on-paper-mute);
}
.entry-card-actions-buttons { display: flex; gap: 4px; }
.action-btn {
  padding: 8px 12px;
  border-radius: var(--r-2);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  font-weight: 500;
  color: var(--on-paper-mute);
  transition: background 0.15s var(--ease), color 0.15s var(--ease), transform 0.1s var(--ease);
  min-height: 32px;
}
.action-btn:hover { background: rgba(0,0,0,0.06); color: var(--on-paper); }
.action-btn:active { transform: scale(0.97); }
.action-btn.danger:hover { color: var(--copper-deep); }
.action-btn.primary { color: var(--copper); }
.action-btn.primary:hover { background: var(--copper-soft); }

.empty-state {
  text-align: center;
  padding: 60px 24px;
  background: var(--paper);
  color: var(--on-paper);
  border-radius: var(--r-2);
}
.empty-state-mark {
  font-family: var(--display);
  font-style: italic;
  font-size: 64px;
  font-weight: 500;
  color: var(--copper);
  line-height: 1;
  margin-bottom: 12px;
  opacity: 0.5;
}
.empty-state-title {
  font-family: var(--display);
  font-size: 24px;
  font-weight: 500;
  margin: 0 0 12px 0;
  letter-spacing: -0.01em;
}
.empty-state-body {
  font-size: 14px;
  color: var(--on-paper-soft);
  max-width: 380px;
  margin: 0 auto 24px auto;
  line-height: 1.65;
}
.empty-state-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}
.empty-state .btn-ghost {
  color: var(--on-paper-mute);
  border-color: var(--rule-paper-2);
}
.empty-state .btn-ghost:hover { color: var(--copper-deep); border-color: var(--copper); background: var(--copper-glow); }

.resume-banner {
  background: linear-gradient(135deg, var(--copper-soft) 0%, var(--paper-2) 100%);
  color: var(--on-paper);
  border-radius: var(--r-2);
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border: 1px solid var(--copper-line);
}
.resume-banner-info {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}
.resume-banner-icon {
  color: var(--copper);
  flex-shrink: 0;
}
.resume-banner-text {
  font-size: 13px;
  min-width: 0;
}
.resume-banner-text strong { font-weight: 600; }

  content: '+';
  color: var(--copper);
  font-family: var(--display);
  font-style: italic;
  font-weight: 500;
}

.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(15, 12, 10, 0.7);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  /* Respect safe-area insets so modal content isn't covered by the iOS
     notch / home indicator. */
  padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
  z-index: 50;
  animation: fadeIn 0.2s var(--ease-out);
  overscroll-behavior: contain;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--paper);
  color: var(--on-paper);
  border-radius: var(--r-2);
  max-width: 440px;
  width: 100%;
  /* Hard cap so the modal can't grow past the viewport; long content (Safety,
     Onboarding, Settings) scrolls inside the modal instead of being clipped
     by the overlay or the keyboard on mobile. */
  max-height: calc(100dvh - 32px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
  overflow-y: auto;
  overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch;
  padding: 24px;
  box-shadow: var(--shadow-3);
  animation: modalIn 0.25s var(--ease-out);
}
@media (max-width: 480px) {
  /* On narrow screens, lose the rounded outer chrome and use the full
     viewport width — a "bottom sheet" feel that lands better one-handed. */
  .modal { padding: 20px; }
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(8px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal h3 {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.01em;
  margin: 0 0 6px 0;
}
.modal-sub {
  font-size: 13px;
  color: var(--on-paper-mute);
  margin: 0 0 20px 0;
  line-height: 1.6;
}
.modal-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.modal-option {
  text-align: left;
  background: var(--paper-2);
  color: var(--on-paper);
  padding: 14px 16px;
  border-radius: var(--r-2);
  transition: all 0.15s var(--ease);
  border: 1px solid transparent;
}
.modal-option:hover {
  background: var(--copper-soft);
  border-color: var(--copper-line);
}
.modal-option-title {
  font-weight: 600;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.modal-option-title svg { color: var(--copper); width: 14px; height: 14px; }
.modal-option-desc { font-size: 12px; color: var(--on-paper-mute); margin-top: 4px; line-height: 1.55; }

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 8px;
}
.btn-modal {
  padding: 10px 18px;
  border-radius: var(--r-2);
  font-size: 13px;
  font-weight: 600;
  transition: all 0.15s var(--ease);
}
.btn-modal-secondary { color: var(--on-paper-mute); }
.btn-modal-secondary:hover { color: var(--on-paper); background: var(--paper-2); }
.btn-modal-danger { background: var(--copper-deep); color: var(--paper); }
.btn-modal-danger:hover { background: var(--copper); }

.toast-stack {
  position: fixed;
  bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 40;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}
.toast {
  background: var(--paper);
  color: var(--on-paper);
  padding: 10px 16px;
  border-radius: var(--r-full);
  font-size: 13px;
  font-weight: 500;
  box-shadow: var(--shadow-3);
  display: flex;
  align-items: center;
  gap: 8px;
  animation: toastIn 0.3s var(--ease-out);
  border-left: 3px solid var(--copper);
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.toast svg { color: var(--copper); width: 16px; height: 16px; }

.file-input { display: none; }

/* Respect the user's motion preference. Smooth scroll, modal fade,
   button press transforms, and hover lifts all become near-instant for
   anyone with vestibular sensitivity or who's just turned reduced
   motion on. The app's information is the point, not the choreography. */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ──────────────────────────────────────────────────────────────────
   CLINICAL SAFETY: scope caveats, grounding gate, "thoughts accurate"
   ────────────────────────────────────────────────────────────────── */

/* "These thoughts feel accurate" affirmation tile — sits above the
   distortion grid so it's the first thing the user sees on Step 3,
   making "not distorted" a first-class option rather than a hidden one. */
.accurate-tile {
  display: block;
  width: 100%;
  text-align: left;
  background: var(--paper-2);
  border: 1px dashed var(--rule-paper-2);
  border-radius: var(--r-3);
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.15s var(--ease);
}
.accurate-tile:hover { border-color: var(--copper-line); }
.accurate-tile.active {
  background: rgba(184, 85, 44, 0.08);
  border-style: solid;
  border-color: var(--copper);
}
.accurate-tile-name {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--display);
  font-size: 15px;
  font-weight: 600;
  color: var(--on-paper);
  margin-bottom: 4px;
}
.accurate-tile.active .accurate-tile-name { color: var(--copper-deep); }
.accurate-tile.active .distortion-tile-check {
  background: var(--copper);
  color: var(--paper);
  border-color: var(--copper);
}
.accurate-tile-desc {
  font-size: 13px;
  color: var(--on-paper-mute);
  line-height: 1.55;
}
.accurate-detail {
  color: var(--copper-deep);
  font-style: italic;
  font-size: 13px;
  line-height: 1.55;
}

/* Grounding gate — shown inline at Step 4 (and inside quick capture)
   when emotion intensity is ≥80, so cognitive work doesn't try to run
   in territory where grounding lands better. */
.grounding-note {
  background: linear-gradient(to right, rgba(184, 85, 44, 0.08), rgba(184, 85, 44, 0.02));
  border: 1px solid var(--copper-line);
  border-left: 3px solid var(--copper);
  border-radius: var(--r-3);
  padding: 14px 16px;
  margin-bottom: 20px;
}
.grounding-note--modal {
  background: rgba(184, 85, 44, 0.10);
  margin-top: 12px;
  margin-bottom: 0;
}
.grounding-note-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper);
  font-weight: 600;
  margin-bottom: 8px;
}
.grounding-note-body p {
  font-size: 13px;
  line-height: 1.6;
  color: var(--on-paper-soft);
  margin: 0 0 8px 0;
}
.grounding-note-body p:last-child { margin-bottom: 0; }
.grounding-note-body strong { color: var(--on-paper); }
.grounding-note-foot { font-size: 12px; color: var(--on-paper-mute); }

html[data-theme="dark"] .grounding-note,
html:not([data-theme="light"]) .grounding-note--modal { /* default dark */ }

/* Onboarding scope caveat — slightly different visual weight than the
   regular modal-sub so users don't skim past it. */
.onboard-caveat {
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-left: 3px solid var(--copper);
  border-radius: var(--r-3);
  padding: 12px 14px;
  margin: 14px 0 18px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--on-paper-soft);
}
.onboard-caveat strong { color: var(--on-paper); }

/* Reference: "When CBT is the right tool" — same visual treatment as
   the safety section but uses the question-mark accent. */
.ref-section--scope {
  border-left: 3px solid var(--copper-line);
  background: linear-gradient(to right, rgba(184, 85, 44, 0.02), transparent 60%);
}
.ref-section--scope .ref-section-num {
  background: var(--paper-3);
  color: var(--copper-deep);
}

/* ──────────────────────────────────────────────────────────────────
   TIER 3: light theme, settings, nudge banner, print
   ────────────────────────────────────────────────────────────────── */

/* Light theme overrides. The app's primary design is dark "ink with paper
   cards floating on top." Light mode inverts the body chrome so the page
   itself reads as paper, while in-card content (capture form, modals,
   reference) — already paper-themed — stays close to its existing look. */
html[data-theme="light"] body {
  background: var(--paper);
  color: var(--on-paper);
}
html[data-theme="light"] body::before {
  background-image:
    radial-gradient(circle at 18% 22%, rgba(184,85,44,0.08) 0%, transparent 45%),
    radial-gradient(circle at 82% 78%, rgba(184,85,44,0.05) 0%, transparent 50%);
}
html[data-theme="light"] .brand-name { color: var(--on-paper); }
html[data-theme="light"] .brand-sub  { color: var(--on-paper-mute); }
html[data-theme="light"] .page-eyebrow { color: var(--on-paper-mute); }
html[data-theme="light"] .page-title { color: var(--on-paper); }
html[data-theme="light"] .page-sub  { color: var(--on-paper-soft); }
html[data-theme="light"] .kicker { color: var(--on-paper-mute); }
html[data-theme="light"] .date-group-rule { background: var(--rule-paper); }

html[data-theme="light"] .icon-pill {
  color: var(--on-paper-soft);
  background: var(--paper-2);
  border-color: var(--rule-paper);
}
html[data-theme="light"] .icon-pill:hover { color: var(--copper); border-color: var(--copper-line); }
html[data-theme="light"] .icon-pill--quick {
  color: var(--copper);
  background: rgba(184, 85, 44, 0.08);
  border-color: var(--copper-line);
}

html[data-theme="light"] .install-pill {
  background: rgba(184, 85, 44, 0.10);
}

html[data-theme="light"] .bottom-nav {
  background: linear-gradient(to top, var(--paper) 60%, rgba(245,239,230,0.85) 100%);
  border-top: 1px solid var(--rule-paper);
}
html[data-theme="light"] .nav-item { color: var(--on-paper-mute); }
html[data-theme="light"] .nav-item:hover { color: var(--on-paper-soft); }
html[data-theme="light"] .nav-item.active { color: var(--copper); }

html[data-theme="light"] .view-chip {
  background: var(--paper-2);
  border-color: var(--rule-paper);
  color: var(--on-paper-soft);
}
html[data-theme="light"] .view-chip:hover { color: var(--copper); border-color: var(--copper-line); }
html[data-theme="light"] .view-chip.active {
  background: rgba(184, 85, 44, 0.10);
  border-color: var(--copper);
  color: var(--copper);
}
html[data-theme="light"] .view-chip-count { background: var(--paper-3); color: var(--on-paper-mute); }
html[data-theme="light"] .view-chip.active .view-chip-count { background: var(--copper); color: var(--paper); }

html[data-theme="light"] .filter-chip {
  background: var(--paper-2);
  border-color: var(--rule-paper);
  color: var(--on-paper-soft);
}
html[data-theme="light"] .filter-chip:hover { color: var(--copper); border-color: var(--copper-line); }
html[data-theme="light"] .filter-chip.active {
  background: var(--copper);
  color: var(--paper);
  border-color: var(--copper);
}

html[data-theme="light"] .search-box {
  background: var(--paper-2);
  border-color: var(--rule-paper);
}
html[data-theme="light"] .search-box svg { color: var(--on-paper-mute); }
html[data-theme="light"] .search-input { color: var(--on-paper); }
html[data-theme="light"] .search-input::placeholder { color: var(--on-paper-mute); }

html[data-theme="light"] .resume-banner,
html[data-theme="light"] .nudge-banner {
  background: var(--paper-2);
  border-color: var(--rule-paper);
}
html[data-theme="light"] .resume-banner strong,
html[data-theme="light"] .nudge-banner strong { color: var(--on-paper); }
html[data-theme="light"] .resume-banner .preview,
html[data-theme="light"] .nudge-banner .preview { color: var(--on-paper-mute); }

html[data-theme="light"] .empty-state-mark { color: var(--copper-deep); }
html[data-theme="light"] .empty-state-title { color: var(--on-paper); }
html[data-theme="light"] .empty-state-body { color: var(--on-paper-soft); }
html[data-theme="light"] .empty-safety { color: var(--on-paper-mute); }

html[data-theme="light"] .coping-strip-eyebrow { color: var(--copper-deep); }
html[data-theme="light"] .coping-strip-meta { color: var(--on-paper-mute); }
html[data-theme="light"] .coping-card { border-color: var(--rule-paper); background: var(--paper); }
html[data-theme="light"] .coping-card-quote { color: var(--on-paper); }

html[data-theme="light"] .entry-flag.flag-sample {
  background: var(--paper-3);
  color: var(--on-paper-mute);
  border-color: var(--rule-paper);
}
html[data-theme="light"] .belief-pill { color: var(--on-paper-soft); }
html[data-theme="light"] .belief-mini { color: var(--on-paper); }

html[data-theme="light"] .pattern-card { /* already paper-themed; no override */ }

html[data-theme="light"] .sw-precache-banner {
  background: var(--paper-2) !important;
  color: var(--on-paper) !important;
}

html[data-theme="light"] ::-webkit-scrollbar-thumb { background: var(--paper-3); }
html[data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: var(--paper-4); }

/* Settings modal */
.settings-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px dashed var(--rule-paper);
}
.settings-section:first-of-type { border-top: none; padding-top: 0; margin-top: 12px; }
.settings-section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper);
  font-weight: 600;
  margin-bottom: 10px;
}
.settings-section-help {
  font-size: 13px;
  color: var(--on-paper-mute);
  line-height: 1.5;
  margin: 0 0 12px 0;
}
.settings-choice-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.settings-choice {
  text-align: left;
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-3);
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.15s var(--ease);
}
.settings-choice:hover { border-color: var(--copper-line); }
.settings-choice.active {
  background: rgba(184, 85, 44, 0.08);
  border-color: var(--copper);
}
.settings-choice-label {
  font-family: var(--display);
  font-size: 15px;
  font-weight: 600;
  color: var(--on-paper);
}
.settings-choice.active .settings-choice-label { color: var(--copper-deep); }
.settings-choice-desc {
  font-size: 12px;
  color: var(--on-paper-mute);
  margin-top: 2px;
  line-height: 1.4;
}

.settings-data-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 8px;
}
.settings-data-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  text-align: left;
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-3);
  padding: 12px 14px;
  cursor: pointer;
  transition: all 0.15s var(--ease);
  width: 100%;
}
.settings-data-btn:hover { border-color: var(--copper-line); background: var(--paper); }
.settings-data-btn:active { transform: scale(0.99); }
.settings-data-icon {
  flex-shrink: 0;
  width: 32px; height: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--r-full);
  background: var(--copper-soft);
  color: var(--copper);
}
.settings-data-icon svg { width: 16px; height: 16px; }
.settings-data-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.settings-data-title {
  font-family: var(--display);
  font-size: 14px;
  font-weight: 600;
  color: var(--on-paper);
}
.settings-data-desc {
  font-size: 12px;
  color: var(--on-paper-mute);
}
.settings-code {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--paper-3);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--on-paper);
}

/* Nudge banner — sits in the journal column at the same width as
   resume-banner so they visually rhyme. */
.nudge-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 18px;
  background: var(--ink-2);
  border: 1px solid var(--copper-line);
  border-radius: var(--r-3);
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.nudge-banner-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1 1 220px;
  min-width: 0;
}
.nudge-banner-icon { color: var(--copper); flex-shrink: 0; }
.nudge-banner-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.nudge-banner-text strong { color: var(--on-ink); font-family: var(--display); font-size: 15px; font-weight: 600; }
.nudge-banner-text .preview { color: var(--on-ink-mute); font-size: 12px; }
.nudge-banner-actions { display: flex; gap: 6px; }
.action-btn.ghost {
  background: transparent;
  color: var(--on-ink-mute);
  border: 1px solid var(--rule-ink);
}
.action-btn.ghost:hover { color: var(--on-ink-soft); border-color: var(--rule-ink-2); }
html[data-theme="light"] .action-btn.ghost { color: var(--on-paper-mute); border-color: var(--rule-paper); }
html[data-theme="light"] .action-btn.ghost:hover { color: var(--on-paper-soft); border-color: var(--rule-paper-2); }

/* Enhanced print: ensure even the dark-theme chrome prints as readable
   black-on-white. Forces light theme regardless of user choice during the
   actual print render. */
@media print {
  html, body { background: white !important; color: black !important; }
  body::before { display: none !important; }
  .bottom-nav, .topbar-actions, .install-pill, .resume-banner,
  .nudge-banner, .coping-strip, .view-chips, .filter-chips,
  .journal-toolbar, .entry-card-actions, .entry-fav-btn,
  .modal-overlay, .pivot-toggle-large { display: none !important; }
  .app { display: block !important; }
  main { padding-bottom: 0 !important; }
  .topbar { padding: 0 0 16px 0 !important; border-bottom: 1px solid #333 !important; margin-bottom: 16px !important; }
  .page-header { page-break-after: avoid; }
  .entry-card {
    box-shadow: none !important;
    border: 1px solid #ccc !important;
    background: white !important;
    color: black !important;
    page-break-inside: avoid;
    margin-bottom: 16px;
  }
  .entry-card.expanded { page-break-inside: auto; }
  .ref-section, .pattern-card {
    box-shadow: none !important;
    border: 1px solid #ccc !important;
    background: white !important;
    color: black !important;
  }
  .nav-item, .icon-pill, .filter-chip, .view-chip { display: none !important; }
  /* Force every detail open under print, including the felt-pill colors. */
  .felt-pill, .belief-pill, .entry-flag, .pivot-followup {
    background: #f5f5f5 !important;
    color: black !important;
    border-color: #ccc !important;
  }
  /* Show a footer with the PWA URL + date so a printed copy isn't anonymous. */
  .print-only { display: block !important; }
}
.print-only { display: none; }

/* ──────────────────────────────────────────────────────────────────
   TIER 2: coping cards, view chips, star, pivot follow-up
   ────────────────────────────────────────────────────────────────── */

/* Coping cards strip */
.coping-strip { margin-bottom: 28px; }
.coping-strip-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 10px;
  padding: 0 2px;
}
.coping-strip-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper);
  font-weight: 600;
}
.coping-strip-meta {
  font-size: 11px;
  color: var(--on-ink-mute);
  font-family: var(--mono);
}
.coping-scroller {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 4px 2px 12px 2px;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
}
.coping-scroller::-webkit-scrollbar { height: 6px; }
.coping-card {
  flex: 0 0 280px;
  scroll-snap-align: start;
  background: var(--paper);
  color: var(--on-paper);
  border-radius: var(--r-3);
  padding: 16px;
  cursor: pointer;
  border: 1px solid var(--rule-paper);
  box-shadow: var(--shadow-1);
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
  position: relative;
  text-align: left;
}
.coping-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-2); }
.coping-card:focus-visible { outline: 2px solid var(--copper); outline-offset: 3px; }
.coping-card-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--on-paper-mute);
}
.coping-card-star { color: var(--copper); font-size: 14px; }
.coping-card-date { font-family: var(--mono); letter-spacing: 0.05em; }
.coping-card-quote {
  font-size: 15px;
  line-height: 1.45;
  color: var(--on-paper);
  margin: 0;
  font-style: italic;
  /* Clamp long reframes so cards stay uniform height-wise. */
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.coping-card-trigger {
  font-size: 12px;
  color: var(--on-paper-soft);
  line-height: 1.5;
  margin: 0;
}
.coping-card-trigger .muted { color: var(--on-paper-faint); }
.coping-card-foot {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: auto;
}
.coping-card-dist {
  font-size: 10px;
  font-family: var(--mono);
  letter-spacing: 0.04em;
  padding: 2px 8px;
  background: var(--paper-2);
  border-radius: var(--r-full);
  color: var(--on-paper-mute);
}

/* View-scope chips above the search */
.view-chips {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  margin: 0 0 12px;
  padding-bottom: 4px;
  scrollbar-width: thin;
}
.view-chips::-webkit-scrollbar { height: 4px; }
.view-chip {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: var(--r-full);
  background: var(--ink-2);
  border: 1px solid var(--rule-ink);
  color: var(--on-ink-soft);
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  transition: all 0.15s var(--ease);
}
.view-chip:hover { color: var(--copper); border-color: var(--copper-line); }
.view-chip.active {
  background: var(--copper-soft);
  border-color: var(--copper);
  color: var(--copper);
}
.view-chip-count {
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 6px;
  background: var(--ink-3);
  border-radius: var(--r-full);
  color: var(--on-ink-mute);
}
.view-chip.active .view-chip-count {
  background: var(--copper);
  color: var(--ink);
}

/* Star/favorite button on each entry card. 36px visible, but the inner
   ::before pseudo expands the tappable area to ~44px without breaking
   the visual rhythm of the meta row. */
.entry-fav-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border-radius: var(--r-full);
  color: var(--on-paper-faint);
  background: transparent;
  border: 1px solid transparent;
  margin-left: 2px;
  flex-shrink: 0;
  transition: all 0.15s var(--ease);
  position: relative;
}
.entry-fav-btn::before {
  /* Invisible expanded hit area so the small star at the top corner of a
     card is still comfortable to tap. */
  content: '';
  position: absolute;
  inset: -4px;
}
.entry-fav-btn:active { transform: scale(0.92); }
.entry-fav-btn:hover {
  color: var(--copper);
  background: var(--copper-soft);
  border-color: var(--copper-line);
}
.entry-fav-btn.active {
  color: var(--copper);
  background: rgba(184, 85, 44, 0.10);
  border-color: var(--copper-line);
}
.entry-fav-btn svg { width: 16px; height: 16px; }
.entry-card.is-favorite { background: linear-gradient(to right, rgba(184, 85, 44, 0.03), transparent 40%), var(--paper); }
.entry-card.is-favorite.is-quick { /* favorite takes visual precedence over quick-border */ }

/* Pivot follow-up reflection */
.pivot-followup {
  background: linear-gradient(to right, var(--copper-soft), transparent 80%);
  border-radius: var(--r-3);
  padding: 12px 14px;
  margin-top: 12px;
}
.pivot-followup-label {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
  color: var(--copper);
}
.pivot-followup-when {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  text-transform: none;
  color: var(--on-paper-faint);
}
.pivot-reflection-input {
  background: var(--paper);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-2);
  padding: 10px 12px;
  width: 100%;
  resize: vertical;
  /* 16px to dodge iOS focus auto-zoom; see .input baseline. */
  font-size: 16px;
  line-height: 1.55;
  color: var(--on-paper);
}
.pivot-reflection-input:focus {
  outline: 2px solid var(--copper);
  outline-offset: 1px;
  border-color: var(--copper);
}

/* ──────────────────────────────────────────────────────────────────
   TIER 1: belief slider, deltas, rerate, quick-capture, safety
   ────────────────────────────────────────────────────────────────── */

.belief-control {
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-3);
  padding: 14px 16px;
}
.belief-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.belief-num { font-size: 28px; font-weight: 600; color: var(--on-paper); letter-spacing: -0.02em; }
.belief-num-suffix { font-size: 14px; color: var(--on-paper-mute); margin-left: 2px; font-weight: 500; }
.belief-hint { font-size: 13px; color: var(--on-paper-mute); }
.belief-hint strong { color: var(--on-paper-soft); font-weight: 600; }

.delta-good { color: var(--copper); font-weight: 700; }
.delta-bad  { color: #b8552c; font-weight: 700; }
.delta-flat { color: var(--on-paper-mute); font-weight: 600; }

.rerate-group {
  border-top: 1px dashed var(--rule-paper-2);
  margin-top: 24px;
  padding-top: 20px;
}
.rerate-head { margin-bottom: 16px; }
.rerate-eyebrow {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper);
  margin-bottom: 6px;
}
.rerate-title { font-size: 20px; margin: 0 0 6px 0; color: var(--on-paper); }
.rerate-sub { font-size: 13px; color: var(--on-paper-mute); margin: 0; line-height: 1.5; }

/* Entry-card deltas */
.intensity-delta {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-left: 6px;
}
.belief-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: rgba(184, 85, 44, 0.10);
  border: 1px solid var(--copper-line);
  border-radius: var(--r-full);
  color: var(--on-paper-soft);
  font-size: 12px;
  font-weight: 500;
}
.belief-mini {
  font-family: var(--mono);
  color: var(--on-paper);
  font-weight: 600;
  font-size: 11px;
}
.delta-tag {
  display: inline-flex;
  align-items: center;
  padding: 1px 6px;
  border-radius: var(--r-full);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.delta-tag.good { background: rgba(184, 85, 44, 0.18); color: var(--copper-deep); }
.delta-tag.flat { background: var(--paper-3); color: var(--on-paper-mute); }

/* Entry-card flag pills (Quick / Sample) */
.entry-meta-flags { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; margin-left: auto; }
.entry-flag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--r-full);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.flag-quick { background: rgba(184, 85, 44, 0.18); color: var(--copper-deep); border: 1px solid var(--copper-line); }
.flag-sample { background: var(--paper-3); color: var(--on-paper-mute); border: 1px solid var(--rule-paper); }
.entry-card.is-quick { border-left: 2px solid var(--copper); }

/* Review rerate block */
.review-rerate {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px dashed var(--rule-paper);
}

/* Patterns: rerate card */
.pattern-card-rerate { display: flex; flex-direction: column; }
.rerate-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 20px;
  margin-top: 8px;
}
.rerate-stat { display: flex; flex-direction: column; gap: 4px; }
.rerate-stat-num {
  font-size: 38px;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--on-paper);
}
.rerate-stat-num.good { color: var(--copper); }
.rerate-stat-num.bad  { color: var(--on-paper-mute); }
.rerate-stat-suffix { font-size: 14px; color: var(--on-paper-mute); margin-left: 3px; font-weight: 500; }
.rerate-stat-label { font-size: 12px; color: var(--on-paper-mute); line-height: 1.4; }
.rerate-stat-sub { font-size: 11px; color: var(--on-paper-faint); }

/* Topbar quick-capture button */
.icon-pill--quick {
  color: var(--copper);
  border-color: var(--copper-line);
  background: var(--copper-soft);
}
.icon-pill--quick:hover {
  color: var(--copper-light);
  border-color: var(--copper);
  background: var(--copper-glow);
}
.icon-pill--quick svg path { fill: currentColor; stroke: currentColor; }

/* Empty-state safety footer */
.empty-safety {
  margin-top: 28px;
  font-size: 13px;
  color: var(--on-ink-mute);
  line-height: 1.55;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
}
.empty-safety strong { color: var(--copper); }

/* Inline button styled like a link, used for "see crisis resources" */
.link-button {
  background: none;
  border: none;
  padding: 0;
  color: var(--copper);
  font: inherit;
  text-decoration: underline;
  text-underline-offset: 2px;
  cursor: pointer;
}
.link-button:hover { color: var(--copper-light); }

/* Modal additions for quick / onboarding / safety */
.modal-body {
  background: var(--paper);
  color: var(--on-paper);
  border-radius: var(--r-3);
  padding: 16px;
  margin: 12px 0;
}
.modal-body .field-label-paper { color: var(--on-paper); }
.modal-body .belief-control { background: var(--paper-2); }
.btn-modal-primary {
  background: var(--copper);
  color: var(--on-paper);
  border: none;
}
.btn-modal-primary:hover { background: var(--copper-light); }

/* Safety section in Reference */
.ref-section--safety {
  border-left: 3px solid var(--copper);
  background: linear-gradient(to right, rgba(184, 85, 44, 0.04), transparent 60%);
}
.ref-section--safety .ref-section-num {
  background: var(--copper);
  color: var(--paper);
}

/* Safety modal list */
.safety-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
.safety-item {
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-3);
  padding: 10px 14px;
}
.safety-name {
  font-family: var(--display);
  font-size: 15px;
  font-weight: 600;
  color: var(--on-paper);
  margin-bottom: 4px;
}
.safety-country {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--on-paper-mute);
  background: var(--paper-3);
  border-radius: var(--r-full);
  padding: 2px 8px;
  margin-left: 6px;
  font-weight: 500;
}
.safety-detail {
  font-size: 13px;
  color: var(--on-paper-soft);
  line-height: 1.55;
}
.safety-detail strong { color: var(--on-paper); font-family: var(--mono); }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ink-3); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }
/* The active @media print block lives further up alongside the Tier 3
   light-theme rules; the older one used to be here and was removed to
   avoid two competing rule sets fighting each other in cascade order. */
</style>
</head>
<body>
<div class="app">
  <div class="container">
    <header class="topbar">
      <div class="brand-row">
        <div class="brand">
          <span class="brand-mark">r</span>

            <div class="brand-name">Reframe</div>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>
  </div>

  <main>
    <div class="container">
      <div id="view"></div>
    </div>
  </main>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <button class="nav-item" data-nav="journal">
        <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h11a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4z"/>
          <path d="M4 4v16"/>

        </svg>
        <span class="nav-label">Journal</span>
      </button>
      <button class="nav-item" data-nav="capture">
        <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

      </button>
      <button class="nav-item" data-nav="patterns">
        <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 18V10M9 18V6M14 18v-5M19 18V8"/>

        <span class="nav-label">Patterns</span>
      </button>
      <button class="nav-item" data-nav="reference">
        <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4v14a2 2 0 0 0 2 2h12V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2z"/>
          <path d="M8 8h6M8 12h6"/>

        <span class="nav-label">Reference</span>
      </button>

</div>

<input type="file" id="import-file" accept=".json,application/json" class="file-input">
<div class="toast-stack" id="toasts"></div>
<div id="modal-root"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// REFERENCE DATA
// ═══════════════════════════════════════════════════════════════════

const DISTORTIONS = [
  { name: "All-or-Nothing Thinking", desc: "Binary extremes.", cues: '"always," "never," "completely," "ruined"' },
  { name: "Overgeneralization", desc: "One event = infinite pattern.", cues: '"every time," "nothing ever"' },
  { name: "Mental Filtering", desc: "Fixating on one negative detail, ignoring the rest.", cues: "" },
  { name: "Disqualifying the Positive", desc: "Dismissing good things.", cues: '"that doesn\'t count," "anyone could do that"' },
  { name: "Mind Reading", desc: "Assuming others' thoughts.", cues: '"she probably," "they must think"' },
  { name: "Fortune Telling", desc: "Predicting negatives as certain.", cues: '"this will definitely," "there\'s no way"' },
  { name: "Catastrophizing", desc: "Worst case far beyond probability.", cues: '"what if," disaster language' },
  { name: "Minimization", desc: "Shrinking positives.", cues: '"it\'s not a big deal"' },
  { name: "Emotional Reasoning", desc: "Feelings as proof.", cues: '"I feel like a failure so I must be one"' },
  { name: "Should Statements", desc: "Rigid rules.", cues: '"I should," "I must," "I have to"' },
  { name: "Labeling", desc: "Fixed label from one behavior.", cues: '"I\'m a terrible partner"' },
  { name: "Personalization", desc: "Blame for things not entirely your fault.", cues: "" },
  { name: "Blame", desc: "Assigning all responsibility to others.", cues: "" },
  { name: "Fallacy of Fairness", desc: "Fixation on fairness.", cues: '"it\'s not fair," "I deserve"' },
  { name: "Fallacy of Change", desc: "Expecting others to change for your happiness.", cues: "" },
  { name: "Control Fallacy (external)", desc: "Powerlessness.", cues: '"there\'s nothing I can do"' },
  { name: "Control Fallacy (internal)", desc: "Overresponsibility.", cues: '"it\'s all on me to fix everything"' },
];

const COMMON_PAIRS = [
  "Catastrophizing + Fortune Telling",
  "Mind Reading + Personalization",
  "All-or-Nothing + Should Statements",
  "Emotional Reasoning + Labeling",
];

const EMOTION_FAMILIES = {
  Anger: ["irritated", "frustrated", "resentful", "bitter", "furious", "hostile", "contemptuous"],
  Anxiety: ["nervous", "worried", "apprehensive", "panicked", "dread", "hypervigilant"],
  Sadness: ["disappointed", "hurt", "dejected", "grief", "hopeless", "lonely", "abandoned"],
  Shame: ["embarrassed", "humiliated", "inadequate", "exposed", "self-conscious"],
  Guilt: ["remorseful", "regretful", "blameworthy", "self-reproachful"],
  Fear: ["scared", "threatened", "insecure", "vulnerable", "helpless"],
  Jealousy: ["envious", "possessive", "excluded", "inferior"],
  Disgust: ["repulsed", "contemptuous", "revolted"],
};

const INTENSITY_BANDS = [
  { max: 20, label: "Mild",        signals: "Matter-of-fact tone, no vocal tension" },
  { max: 40, label: "Moderate",    signals: "Slight edge, lingering on the topic" },
  { max: 60, label: "Significant", signals: "Repeating the issue, vocal frustration" },
  { max: 80, label: "High",        signals: "Raised voice, spiraling, hard to drop" },
  { max: 100, label: "Severe",     signals: "Shutdown, crying, yelling, physical distress" },
];

const BODY_REGIONS = [
  { region: "Head",       examples: "headache, pressure behind eyes, foggy thinking" },
  { region: "Throat/Jaw", examples: "lump in throat, jaw clenching, voice tightening" },
  { region: "Chest",      examples: "tightness, racing heart, heaviness, shortness of breath" },
  { region: "Stomach",    examples: "knot, nausea, butterflies, sinking feeling" },
  { region: "Muscles",    examples: "tension in shoulders/neck/back, restlessness" },
  { region: "Skin",       examples: "flushing, sweating, tingling, numbness" },
  { region: "Energy",     examples: "fatigue, heaviness, jittery, unable to sit still" },
];

const SOCRATIC_TYPES = [
  { type: "Evidence examination",   when: "Thought stated as fact without proof",       template: "What evidence do I actually have that [thought] is true?" },
  { type: "Alternative explanation", when: "Locked into one interpretation",            template: "Is there another way to explain why [person] did that?" },
  { type: "Probability testing",    when: "Catastrophizing / fortune telling",          template: "How likely is [worst case] on a scale of 0–100%?" },
  { type: "Historical testing",     when: "Treating this as a pattern",                 template: "How many times has [feared outcome] actually happened vs not?" },
  { type: "Double standard",        when: "Harsher on self than on others",             template: "If a friend told me they did this, what would I say?" },
  { type: "Decatastrophizing",      when: "Worst-case thinking",                        template: "If the worst case happened, what would I realistically do?" },
  { type: "Cost-benefit",           when: "Should statements / rigid rules",            template: "What does holding this belief cost me vs give me?" },
  { type: "Perspective broadening", when: "Tunnel vision / mental filtering",           template: "What would this look like zoomed out to the full week or year?" },
];

const REFRAME_METHODS = [
  { method: "Growth-Oriented",             when: "Self-criticism about ability", does: "Reframes as learning without minimizing difficulty" },
  { method: "Realism",                     when: "Catastrophizing",              does: "Replaces extreme prediction with most probable outcome" },
  { method: "vs. Absolutes",               when: "All-or-nothing language",      does: 'Replaces "never/always" with proportional truth' },
  { method: "Compassionate reattribution", when: "Personalized blame",           does: "Redistributes responsibility fairly" },
  { method: "Behavioral experiment",       when: "Untested assumptions",         does: "Reframes as hypothesis to test" },
];

const STEP_TITLES = ["Trigger", "Initial Reaction", "Distortion", "Challenge", "Reframe", "Pivot", "Review"];
const STEP_PROMPTS = [
  "What happened?",
  "What came up?",
  "Which patterns showed up?",
  "Put the thought on trial.",
  "Write a thought you'd accept.",
  "One concrete action.",
  "Read it back.",
];
const STEP_HINTS = [
  "Just the event. Skip interpretation for now.",
  "The first thought, the feeling, the body.",
  "Pick all that apply. Multiple is normal.",
  "Both sides on the table, then one well-placed question.",
  "Eye-roll test: would you say \"yeah, that's fair\"?",
  "Specific enough to do today.",
  "Make changes by tapping a section. Save when it's right.",
];

// A realistic, well-filled-in example so first-time users can see what a
// complete thought record looks like before they have to write one. Loaded
// on demand from the empty-state "Load example" button and from onboarding.
// isSample:true marks it as removable in one tap.
const SAMPLE_ENTRY = {
  id: "sample-" + Date.now().toString(36),
  createdAt: new Date().toISOString(),
  trigger: "Stood up too fast at the pedicure place and broke the chair. Two other clients turned to look. I paid and walked out without finishing.",
  automaticThought: "Everyone saw that. They all think I'm a huge clumsy idiot and I can never go back there.",
  emotionFamily: "Shame",

// ═══════════════════════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════════════════════

const STORAGE_KEY = "reframe-journal-v1";
const DRAFT_KEY   = "reframe-journal-draft-v1";
const ONBOARDED_KEY = "reframe-onboarded-v1";
const SETTINGS_KEY = "reframe-settings-v1";

const DEFAULT_SETTINGS = {
  theme: "auto",             // "auto" | "light" | "dark"
  reminderInterval: "off",   // "off" | "daily" | "3days" | "weekly"
  nudgeSnoozedUntil: 0,      // epoch ms; suppress the nudge banner until this time
};
function loadSettings() {
  try {
    const raw = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "{}");
    return { ...DEFAULT_SETTINGS, ...(raw || {}) };
  } catch { return { ...DEFAULT_SETTINGS }; }
}
function saveSettings(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

// Reminder interval → milliseconds. `off` returns 0 to short-circuit checks.
const REMINDER_MS = {
  off:     0,
  daily:   24 * 3600 * 1000,
  "3days": 3 * 24 * 3600 * 1000,
  weekly:  7 * 24 * 3600 * 1000,
};
const REMINDER_LABELS = {
  off:     "Off",
  daily:   "Daily",
  "3days": "Every 3 days",
  weekly:  "Weekly",
};

// Fields added after v1 shipped. Existing JSON exports won't carry them, so
// we normalize on read to a stable shape. null (not 0) means "not rated" —
// that distinction matters for the before/after delta display.
function normalizeEntry(e) {
  return {
    id: e.id || "",
    createdAt: e.createdAt || "",
    updatedAt: e.updatedAt || undefined,
    trigger: e.trigger || "",
    automaticThought: e.automaticThought || "",
    emotionFamily: e.emotionFamily || "",
    emotionVariant: e.emotionVariant || "",
    emotionIntensity: typeof e.emotionIntensity === "number" ? e.emotionIntensity : 40,
    emotionEstimated: !!e.emotionEstimated,
    bodyCheck: e.bodyCheck || "",
    bodyInferred: !!e.bodyInferred,
    distortions: Array.isArray(e.distortions) ? e.distortions : [],
    distortionNote: e.distortionNote || "",
    // "I looked at the thought and it actually feels accurate to me" — a
    // valid CBT outcome that the workflow needs to permit explicitly,
    // otherwise users in real grief / valid distress get nudged into
    // pathologizing healthy reactions.
    thoughtsAccurate: !!e.thoughtsAccurate,
    evidenceFor: e.evidenceFor || "",
    evidenceAgainst: e.evidenceAgainst || "",
    socraticType: e.socraticType || "",
    socraticQuestion: e.socraticQuestion || "",
    reframeMethod: e.reframeMethod || "",
    newThought: e.newThought || "",
    pivot: e.pivot || "",
    pivotDone: !!e.pivotDone,
    pivotDoneAt: e.pivotDoneAt || "",         // ISO timestamp the pivot was marked done
    pivotReflection: e.pivotReflection || "", // "What happened?" follow-up
    // Re-rating fields. null = not yet rated.
    beliefBefore: typeof e.beliefBefore === "number" ? e.beliefBefore : null,
    beliefAfter: typeof e.beliefAfter === "number" ? e.beliefAfter : null,
    emotionIntensityAfter: typeof e.emotionIntensityAfter === "number" ? e.emotionIntensityAfter : null,
    // Provenance flags.
    isQuick: !!e.isQuick,         // entered via the quick-capture path; needs finishing
    isSample: !!e.isSample,       // pre-loaded demo entry the user can delete
    isFavorite: !!e.isFavorite,   // pinned as a coping card
  };
}

function loadEntries() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    return Array.isArray(raw) ? raw.map(normalizeEntry) : [];
  }
  catch { return []; }
}
function saveEntries(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
function loadDraft() {
  try {
    const raw = JSON.parse(localStorage.getItem(DRAFT_KEY) || "null");
    return raw ? normalizeEntry(raw) : null;
  }
  catch { return null; }
}
function saveDraft(d) {
  const has = d && (d.trigger || d.automaticThought || d.evidenceFor || d.evidenceAgainst || d.newThought || d.pivot || (d.distortions && d.distortions.length));
  if (has) localStorage.setItem(DRAFT_KEY, JSON.stringify(d));
  else localStorage.removeItem(DRAFT_KEY);
}
function clearDraft() { localStorage.removeItem(DRAFT_KEY); }

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════

const newId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const band = n => INTENSITY_BANDS.find(b => n <= b.max) || INTENSITY_BANDS[4];

function emptyEntry() {
  return {
    id: "", createdAt: "",
    trigger: "", automaticThought: "",
    emotionFamily: "", emotionVariant: "", emotionIntensity: 40, emotionEstimated: false,
    bodyCheck: "", bodyInferred: false,
    distortions: [], distortionNote: "", thoughtsAccurate: false,
    evidenceFor: "", evidenceAgainst: "",
    socraticType: "", socraticQuestion: "",
    reframeMethod: "", newThought: "",
    pivot: "", pivotDone: false, pivotDoneAt: "", pivotReflection: "",
    beliefBefore: null, beliefAfter: null, emotionIntensityAfter: null,
    isQuick: false, isSample: false, isFavorite: false,
  };
}

function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function fmtTime(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
}
function fmtDateTime(iso) { return fmtDate(iso) + " · " + fmtTime(iso); }

function startOfDay(d) {
  const x = new Date(d);
  x.setHours(0, 0, 0, 0);
  return x;
}
function daysBetween(a, b) {
  return Math.round((startOfDay(a) - startOfDay(b)) / 86400000);
}
function dateGroupLabel(iso) {
  const days = daysBetween(new Date(), new Date(iso));
  if (days === 0) return "Today";
  if (days === 1) return "Yesterday";
  if (days < 7) return "This week";
  if (days < 14) return "Last week";
  if (days < 30) return "This month";
  if (days < 90) return "Last 3 months";
  return "Earlier";
}

function entryToMd(e, idx) {
  const L = [];
  L.push("---", "", "### Entry " + (idx + 1), "");
  L.push("**1. Trigger (Antecedent)**", "", e.trigger || "—", "");
  L.push("**2. Initial Reaction**", "");
  L.push('- **Automatic Thought:** "' + e.automaticThought + '"', "");
  const emoLabel = e.emotionVariant ? (cap(e.emotionVariant) + " (" + e.emotionFamily + ")") : (e.emotionFamily || "—");
  const estTag = e.emotionEstimated ? " *(estimated)*" : "";
  L.push("- **Emotion:** " + emoLabel + " — **Intensity:** " + e.emotionIntensity + "/100" + estTag, "");
  if (e.beliefBefore !== null && e.beliefBefore !== undefined) {
    L.push("- **Belief in thought (before):** " + e.beliefBefore + "%", "");
  }
  const infTag = e.bodyInferred ? " *(inferred from speech)*" : "";
  L.push("- **Body Check:** " + (e.bodyCheck || "—") + infTag, "");
  L.push("**3. Distortion Identified**", "");
  if (e.thoughtsAccurate) {
    L.push("*Marked as accurate, not distorted — the thought here was true to the writer; the rest of the entry holds it rather than arguing with it.*", "");
  } else {
    L.push(e.distortions.length ? e.distortions.map(d => "**" + d + "**").join(" + ") : "—", "");
    if (e.distortionNote) L.push(e.distortionNote, "");
  }
  L.push("**4. Challenge (The Trial)**", "");
  L.push("- **Evidence FOR:** " + (e.evidenceFor || "—"), "");
  L.push("- **Evidence AGAINST:** " + (e.evidenceAgainst || "—"), "");
  L.push('- **Socratic Question:** "' + e.socraticQuestion + '"', "");
  L.push("**5. Reframe**", "");
  L.push("- **Method:** " + (e.reframeMethod || "—"), "");
  L.push('- **New Thought:** "' + e.newThought + '"', "");
  if (e.beliefAfter !== null && e.beliefAfter !== undefined) {
    const drop = e.beliefBefore !== null && e.beliefBefore !== undefined ? (" (Δ " + (e.beliefAfter - e.beliefBefore) + ")") : "";
    L.push("- **Belief in thought (after):** " + e.beliefAfter + "%" + drop, "");
  }
  if (e.emotionIntensityAfter !== null && e.emotionIntensityAfter !== undefined) {
    L.push("- **Emotion intensity (after):** " + e.emotionIntensityAfter + "/100 (Δ " + (e.emotionIntensityAfter - e.emotionIntensity) + ")", "");
  }
  L.push("**6. The Pivot**", "", e.pivot || "—", "");
  if (e.pivotDone) {
    L.push("", "*Pivot completed" + (e.pivotDoneAt ? " — " + fmtDateTime(e.pivotDoneAt) : "") + ".*", "");
    if (e.pivotReflection) {
      L.push("**What happened**", "", e.pivotReflection, "");
    }
  }
  if (e.isFavorite) L.push("", "★ *Coping card — pinned.*", "");
  return L.join("\n");
}

function download(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function toast(message) {
  const stack = document.getElementById("toasts");
  const el = document.createElement("div");
  el.className = "toast";
  el.innerHTML = `
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3 3 7-7"/></svg>
    <span>${esc(message)}</span>`;
  stack.appendChild(el);
  setTimeout(() => {
    el.style.opacity = "0";
    el.style.transform = "translateY(8px)";
    el.style.transition = "all 0.3s var(--ease)";
    setTimeout(() => el.remove(), 300);
  }, 2400);
}
