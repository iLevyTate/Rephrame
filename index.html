  align-items: center;
  gap: 8px;
  animation: toastIn 0.3s var(--ease-out);
  border-left: 3px solid var(--copper);
}
@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.toast svg { color: var(--copper); width: 16px; height: 16px; }
.toast--action { padding-right: 6px; }
.toast-action {
  background: var(--copper);
  color: var(--paper);
  border: none;
  border-radius: var(--r-full);
  padding: 4px 12px;
  font: inherit;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  margin-left: 4px;
}
.toast-action:hover { background: var(--copper-light); }
.toast-action:active { transform: scale(0.96); }

/* Error-variant toast: deeper copper border-left, longer dwell, manual
   dismiss via × button. Used for import-parse failures and unexpected
   save errors. */
.toast--error {
  border-left: 3px solid var(--copper-deep);
  background: var(--paper);
  color: var(--on-paper);
  padding-left: 14px;
}
.toast--error svg { color: var(--copper-deep); }
.toast-close {
  background: transparent;
  border: none;
  color: var(--on-paper-mute);
  font-size: 20px;
  line-height: 1;
  padding: 0 4px;
  cursor: pointer;
  margin-left: 4px;
  border-radius: var(--r-2);
  transition: color var(--dur-short) var(--ease), background var(--dur-short) var(--ease);
}
.toast-close:hover { color: var(--on-paper); background: rgba(0,0,0,0.05); }

.file-input { display: none; }

/* Respect the user's motion preference. Smooth scroll, modal fade,
   button press transforms, and hover lifts all become near-instant for
   anyone with vestibular sensitivity or who's just turned reduced
   motion on. The app's information is the point, not the choreography. */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
    scroll-behavior: auto !important;
  }
}

/* ──────────────────────────────────────────────────────────────────
   PRIVACY LOCK: lock screen, PIN inputs, lock-now state
   ────────────────────────────────────────────────────────────────── */

body.is-locked .app,
body.is-locked .toast-stack { display: none !important; }
body.is-locked { overflow: hidden; }

.lock-screen {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: max(24px, env(safe-area-inset-top)) 24px max(24px, env(safe-area-inset-bottom));
  background: var(--ink);
  color: var(--on-ink);
  animation: fadeIn 0.2s var(--ease-out);
}
html[data-theme="light"] .lock-screen { background: var(--paper); color: var(--on-paper); }

.lock-card {
  width: 100%;
  max-width: 360px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  text-align: center;
}
.lock-brand {
  display: inline-flex;
  align-items: baseline;
  gap: 10px;
  margin: 0 auto 4px;
}
.lock-help {
  font-size: 14px;
  color: var(--on-ink-mute);
  line-height: 1.5;
  margin: 0;
}
html[data-theme="light"] .lock-help { color: var(--on-paper-mute); }

.lock-form { display: flex; flex-direction: column; gap: 12px; align-items: stretch; }
.lock-pin-input {
  text-align: center;
  letter-spacing: 0.6em;
  font-family: var(--mono);
  font-size: 22px;
  font-weight: 600;
  padding: 14px 18px;
  background: var(--ink-2);
  color: var(--on-ink);
  border: 1px solid var(--rule-ink);
  border-radius: var(--r-3);
  outline: none;
  transition: border-color 0.15s var(--ease);
}
.lock-pin-input:focus { border-color: var(--copper); }
html[data-theme="light"] .lock-pin-input {
  background: var(--paper-2);
  color: var(--on-paper);
  border-color: var(--rule-paper);
}
html[data-theme="light"] .lock-pin-input:focus { border-color: var(--copper); }
.lock-screen.has-error .lock-pin-input {
  border-color: var(--copper-deep);
  animation: shake 0.4s var(--ease);
}
@keyframes shake {
  10%, 90% { transform: translateX(-2px); }
  20%, 80% { transform: translateX(3px); }
  30%, 50%, 70% { transform: translateX(-5px); }
  40%, 60% { transform: translateX(5px); }
}
.lock-error {
  font-size: 13px;
  color: var(--copper-light);
  margin: 0;
}
html[data-theme="light"] .lock-error { color: var(--copper-deep); }
.lock-submit { width: 100%; }
.lock-forgot {
  font-size: 13px;
  margin-top: 4px;
}
.lock-help-panel {
  margin-top: 12px;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: var(--r-2);
  font-size: 12px;
  line-height: 1.55;
  color: var(--on-ink-mute);
  text-align: left;
}
.lock-help-panel p { margin: 0; }
.lock-help-panel p + p { margin-top: 8px; }
.lock-help-panel strong { color: var(--on-ink); }
html[data-theme="light"] .lock-help-panel {
  background: var(--paper-2);
  border-color: var(--rule-paper);
  color: var(--on-paper-mute);
}
html[data-theme="light"] .lock-help-panel strong { color: var(--on-paper); }

/* PIN-form modal (set / change / remove) */
.pin-form { display: flex; flex-direction: column; }
.pin-form .field-label-paper { margin-bottom: 6px; }
.pin-input {
  text-align: center;
  letter-spacing: 0.5em;
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 600;
  padding: 12px 14px;
  background: var(--paper-2);
  color: var(--on-paper);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-2);
  outline: none;
  width: 100%;
  transition: border-color 0.15s var(--ease);
}
.pin-input:focus { border-color: var(--copper); }
.pin-error {
  margin: 12px 0 0;
  font-size: 13px;
  color: var(--copper-deep);
}

/* ──────────────────────────────────────────────────────────────────
   CLINICAL SAFETY: scope caveats, grounding gate, "thoughts accurate"
   ────────────────────────────────────────────────────────────────── */

/* "These thoughts feel accurate" affirmation tile — sits above the
   distortion grid so it's the first thing the user sees on Step 4,
   making "not distorted" a first-class option rather than a hidden one. */
.accurate-tile {
  display: block;
  width: 100%;
  text-align: left;
  background: var(--paper-2);
  border: 1px dashed var(--rule-paper-2);
  border-radius: var(--r-3);
  padding: 14px 16px;
  cursor: pointer;
  transition: background var(--dur-short) var(--ease), color var(--dur-short) var(--ease), border-color var(--dur-short) var(--ease), transform var(--dur-micro) var(--ease);
}
.accurate-tile:hover { border-color: var(--copper-line); }
.accurate-tile.active {
  background: rgba(184, 85, 44, 0.08);
  border-style: solid;
  border-color: var(--copper);
}
.accurate-tile-name {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--display);
  font-size: 15px;
  font-weight: 600;
  color: var(--on-paper);
  margin-bottom: 4px;
}
.accurate-tile.active .accurate-tile-name { color: var(--copper-deep); }
.accurate-tile.active .distortion-tile-check {
  background: var(--copper);
  color: var(--paper);
  border-color: var(--copper);
}
.accurate-tile-desc {
  font-size: 13px;
  color: var(--on-paper-mute);
  line-height: 1.55;
}
.accurate-detail {
  color: var(--copper-deep);
  font-style: italic;
  font-size: 13px;
  line-height: 1.55;
}

/* Grounding gate — shown inline at Step 3 (and inside quick capture)
   when emotion intensity is ≥80, so cognitive work doesn't try to run
   in territory where grounding lands better. */
.grounding-note {
  background: linear-gradient(to right, rgba(184, 85, 44, 0.08), rgba(184, 85, 44, 0.02));
  border: 1px solid var(--copper-line);
  border-left: 3px solid var(--copper);
  border-radius: var(--r-3);
  padding: 14px 16px;
  margin-bottom: 20px;
}
.grounding-note--modal {
  background: rgba(184, 85, 44, 0.10);
  margin-top: 12px;
  margin-bottom: 0;
}
.grounding-note-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper);
  font-weight: 600;
  margin-bottom: 8px;
}
.grounding-note-body p {
  font-size: 13px;
  line-height: 1.6;
  color: var(--on-paper-soft);
  margin: 0 0 8px 0;
}
.grounding-note-body p:last-child { margin-bottom: 0; }
.grounding-note-body strong { color: var(--on-paper); }
.grounding-note-foot { font-size: 12px; color: var(--on-paper-mute); }

html[data-theme="dark"] .grounding-note,
html:not([data-theme="light"]) .grounding-note--modal { /* default dark */ }

/* Onboarding scope caveat — slightly different visual weight than the
   regular modal-sub so users don't skim past it. */
.onboard-caveat {
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-left: 3px solid var(--copper);
  border-radius: var(--r-3);
  padding: 12px 14px;
  margin: 14px 0 18px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--on-paper-soft);
}
.onboard-caveat strong { color: var(--on-paper); }

/* Reference: "When CBT is the right tool" — same visual treatment as
   the safety section but uses the question-mark accent. Layer the
   warm wash ON TOP of the inherited paper background — using `background`
   shorthand alone here would set background-color: transparent and let
   the dark body show through, which made the dark-on-paper title text
   render as #1a1715 on #1a1715 (literally invisible). */
.ref-section--scope {
  border-left: 3px solid var(--copper-line);
  background: linear-gradient(to right, rgba(184, 85, 44, 0.04), transparent 60%), var(--paper);
}
.ref-section--scope .ref-section-num {
  background: var(--paper-3);
  color: var(--copper-deep);
}

/* ──────────────────────────────────────────────────────────────────
   TIER 3: light theme, settings, nudge banner, print
   ────────────────────────────────────────────────────────────────── */

/* Light theme overrides. The app's primary design is dark "ink with paper
   cards floating on top." Light mode inverts the body chrome so the page
   itself reads as paper, while in-card content (capture form, modals,
   reference) — already paper-themed — stays close to its existing look. */
html[data-theme="light"] body {
  background: var(--paper);
  color: var(--on-paper);
}
html[data-theme="light"] body::before {
  background-image:
    radial-gradient(circle at 18% 22%, rgba(184,85,44,0.08) 0%, transparent 45%),
    radial-gradient(circle at 82% 78%, rgba(184,85,44,0.05) 0%, transparent 50%);
}
html[data-theme="light"] .brand-name { color: var(--on-paper); }
html[data-theme="light"] .brand-sub  { color: var(--on-paper-mute); }
html[data-theme="light"] .page-eyebrow { color: var(--on-paper-mute); }
html[data-theme="light"] .page-title { color: var(--on-paper); }
html[data-theme="light"] .page-sub  { color: var(--on-paper-soft); }
html[data-theme="light"] .kicker { color: var(--on-paper-mute); }
html[data-theme="light"] .date-group-rule { background: var(--rule-paper); }

html[data-theme="light"] .icon-pill {
  color: var(--on-paper-soft);
  background: var(--paper-2);
  border-color: var(--rule-paper);
}
html[data-theme="light"] .icon-pill:hover { color: var(--copper); border-color: var(--copper-line); }
html[data-theme="light"] .icon-pill--quick {
  color: var(--copper);
  background: rgba(184, 85, 44, 0.08);
  border-color: var(--copper-line);
}

html[data-theme="light"] .install-pill {
  background: rgba(184, 85, 44, 0.10);
}

html[data-theme="light"] .bottom-nav {
  background: linear-gradient(to top, var(--paper) 60%, rgba(245,239,230,0.85) 100%);
  border-top: 1px solid var(--rule-paper);
}
html[data-theme="light"] .nav-item { color: var(--on-paper-mute); }
html[data-theme="light"] .nav-item:hover { color: var(--on-paper-soft); }
html[data-theme="light"] .nav-item.active { color: var(--copper); }

html[data-theme="light"] .view-chip {
  background: var(--paper-2);
  border-color: var(--rule-paper);
  color: var(--on-paper-soft);
}
html[data-theme="light"] .view-chip:hover { color: var(--copper); border-color: var(--copper-line); }
html[data-theme="light"] .view-chip.active {
  background: rgba(184, 85, 44, 0.10);
  border-color: var(--copper);
  color: var(--copper);
}
html[data-theme="light"] .view-chip-count { background: var(--paper-3); color: var(--on-paper-mute); }
html[data-theme="light"] .view-chip.active .view-chip-count { background: var(--copper); color: var(--paper); }

html[data-theme="light"] .filter-chip {
  background: var(--paper-2);
  border-color: var(--rule-paper);
  color: var(--on-paper-soft);
}
html[data-theme="light"] .filter-chip:hover { color: var(--copper); border-color: var(--copper-line); }
html[data-theme="light"] .filter-chip.active {
  background: var(--copper);
  color: var(--paper);
  border-color: var(--copper);
}

html[data-theme="light"] .search-box {
  background: var(--paper-2);
  border-color: var(--rule-paper);
}
html[data-theme="light"] .search-box svg { color: var(--on-paper-mute); }
html[data-theme="light"] .search-input { color: var(--on-paper); }
html[data-theme="light"] .search-input::placeholder { color: var(--on-paper-mute); }

html[data-theme="light"] .resume-banner,
html[data-theme="light"] .nudge-banner {
  background: var(--paper-2);
  border-color: var(--rule-paper);
}
html[data-theme="light"] .resume-banner strong,
html[data-theme="light"] .nudge-banner strong { color: var(--on-paper); }
html[data-theme="light"] .resume-banner .preview,
html[data-theme="light"] .nudge-banner .preview { color: var(--on-paper-mute); }

/* In light mode the gradient still reads well — the only thing we need
   to tweak is the soft glow, which would be invisible on paper without
   slightly more opacity. */
html[data-theme="light"] .empty-state-mark::before {
  text-shadow: 0 0 28px rgba(184, 85, 44, 0.18);
}
html[data-theme="light"] .empty-state-mark--alt { color: var(--copper-deep); }
html[data-theme="light"] .empty-state-title { color: var(--on-paper); }
html[data-theme="light"] .empty-state-body { color: var(--on-paper-soft); }
html[data-theme="light"] .empty-safety { color: var(--on-paper-mute); }

html[data-theme="light"] .coping-strip-eyebrow { color: var(--copper-deep); }
html[data-theme="light"] .coping-strip-meta { color: var(--on-paper-mute); }
html[data-theme="light"] .coping-card { border-color: var(--rule-paper); background: var(--paper); }
html[data-theme="light"] .coping-card-quote { color: var(--on-paper); }

html[data-theme="light"] .entry-flag.flag-sample {
  background: var(--paper-3);
  color: var(--on-paper-mute);
  border-color: var(--rule-paper);
}
html[data-theme="light"] .belief-pill { color: var(--on-paper-soft); }
html[data-theme="light"] .belief-mini { color: var(--on-paper); }

html[data-theme="light"] .pattern-card { /* already paper-themed; no override */ }

html[data-theme="light"] .sw-precache-banner {
  background: var(--paper-2) !important;
  color: var(--on-paper) !important;
}

html[data-theme="light"] ::-webkit-scrollbar-thumb { background: var(--paper-3); }
html[data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: var(--paper-4); }

/* Settings modal */
.settings-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px dashed var(--rule-paper);
}
.settings-section:first-of-type { border-top: none; padding-top: 0; margin-top: 12px; }
.settings-section-title {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper);
  font-weight: 600;
  margin-bottom: 10px;
}
.settings-section-help {
  font-size: 13px;
  color: var(--on-paper-mute);
  line-height: 1.5;
  margin: 0 0 12px 0;
}
.settings-choice-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.settings-time-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 10px 14px;
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-3);
}
.settings-time-label {
  font-family: var(--body);
  font-size: 14px;
  font-weight: 500;
  color: var(--on-paper);
}
.settings-time-input {
  font-family: var(--mono);
  font-size: 14px;
  padding: 6px 10px;
  background: var(--paper);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-2);
  color: var(--on-paper);
  cursor: pointer;
}
.settings-time-input:focus-visible {
  outline: 2px solid var(--copper);
  outline-offset: 1px;
}
.settings-choice {
  text-align: left;
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-3);
  padding: 10px 14px;
  cursor: pointer;
  transition: background var(--dur-short) var(--ease), color var(--dur-short) var(--ease), border-color var(--dur-short) var(--ease), transform var(--dur-micro) var(--ease);
}
.settings-choice:hover { border-color: var(--copper-line); }
.settings-choice.active {
  background: rgba(184, 85, 44, 0.08);
  border-color: var(--copper);
}
.settings-choice-label {
  font-family: var(--display);
  font-size: 15px;
  font-weight: 600;
  color: var(--on-paper);
}
.settings-choice.active .settings-choice-label { color: var(--copper-deep); }
.settings-choice-desc {
  font-size: 12px;
  color: var(--on-paper-mute);
  margin-top: 2px;
  line-height: 1.4;
}

.settings-data-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 8px;
}
.settings-data-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  text-align: left;
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-3);
  padding: 12px 14px;
  cursor: pointer;
  transition: background var(--dur-short) var(--ease), color var(--dur-short) var(--ease), border-color var(--dur-short) var(--ease), transform var(--dur-micro) var(--ease);
  width: 100%;
}
.settings-data-btn:hover { border-color: var(--copper-line); background: var(--paper); }
.settings-data-btn:active { transform: scale(0.99); }
.settings-data-icon {
  flex-shrink: 0;
  width: 32px; height: 32px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--r-full);
  background: var(--copper-soft);
  color: var(--copper);
}
.settings-data-icon svg { width: 16px; height: 16px; }
.settings-data-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.settings-data-title {
  font-family: var(--display);
  font-size: 14px;
  font-weight: 600;
  color: var(--on-paper);
}
.settings-data-desc {
  font-size: 12px;
  color: var(--on-paper-mute);
}
.settings-code {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--paper-3);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--on-paper);
}

/* Nudge banner — sits in the journal column at the same width as
   resume-banner so they visually rhyme. */
.nudge-banner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 18px;
  background: var(--ink-2);
  border: 1px solid var(--copper-line);
  border-radius: var(--r-3);
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.nudge-banner-info {
  display: flex;
  align-items: center;
  gap: 12px;
  flex: 1 1 220px;
  min-width: 0;
}
.nudge-banner-icon { color: var(--copper); flex-shrink: 0; }
.nudge-banner-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.nudge-banner-text strong { color: var(--on-ink); font-family: var(--display); font-size: 15px; font-weight: 600; }
.nudge-banner-text .preview { color: var(--on-ink-mute); font-size: 12px; }
.nudge-banner-actions { display: flex; gap: 6px; }
.action-btn.ghost {
  background: transparent;
  color: var(--on-ink-mute);
  border: 1px solid var(--rule-ink);
}
.action-btn.ghost:hover { color: var(--on-ink-soft); border-color: var(--rule-ink-2); }
html[data-theme="light"] .action-btn.ghost { color: var(--on-paper-mute); border-color: var(--rule-paper); }
html[data-theme="light"] .action-btn.ghost:hover { color: var(--on-paper-soft); border-color: var(--rule-paper-2); }

/* Enhanced print: ensure even the dark-theme chrome prints as readable
   black-on-white. Forces light theme regardless of user choice during the
   actual print render. */
@media print {
  html, body { background: white !important; color: black !important; }
  body::before { display: none !important; }
  .bottom-nav, .topbar-actions, .install-pill, .resume-banner,
  .nudge-banner, .coping-strip, .view-chips, .filter-chips,
  .journal-toolbar, .entry-card-actions, .entry-fav-btn,
  .modal-overlay, .pivot-toggle-large { display: none !important; }
  .app { display: block !important; }
  main { padding-bottom: 0 !important; }
  .topbar { padding: 0 0 16px 0 !important; border-bottom: 1px solid #333 !important; margin-bottom: 16px !important; }
  .page-header { page-break-after: avoid; }
  .entry-card {
    box-shadow: none !important;
    border: 1px solid #ccc !important;
    background: white !important;
    color: black !important;
    page-break-inside: avoid;
    margin-bottom: 16px;
  }
  .entry-card.expanded { page-break-inside: auto; }
  .ref-section, .pattern-card {
    box-shadow: none !important;
    border: 1px solid #ccc !important;
    background: white !important;
    color: black !important;
  }
  .nav-item, .icon-pill, .filter-chip, .view-chip { display: none !important; }
  /* Force every detail open under print, including the felt-pill colors. */
  .felt-pill, .belief-pill, .entry-flag, .pivot-followup {
    background: #f5f5f5 !important;
    color: black !important;
    border-color: #ccc !important;
  }
  /* Show a footer with the PWA URL + date so a printed copy isn't anonymous. */
  .print-only { display: block !important; }
}
.print-only { display: none; }

/* ──────────────────────────────────────────────────────────────────
   TIER 2: coping cards, view chips, star, pivot follow-up
   ────────────────────────────────────────────────────────────────── */

/* Coping cards strip */
.coping-strip { margin-bottom: 28px; }
.coping-strip-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 10px;
  padding: 0 2px;
}
.coping-strip-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper);
  font-weight: 600;
}
.coping-strip-meta {
  font-size: 11px;
  color: var(--on-ink-mute);
  font-family: var(--mono);
}
.coping-scroller {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  padding: 4px 16px 12px 16px;
  margin-left: -16px;
  margin-right: -16px;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: thin;
  /* Same edge-fade trick as the view-chips so users can see there's
     more to swipe to. */
  -webkit-mask-image: linear-gradient(to right, transparent 0, #000 16px, #000 calc(100% - 16px), transparent 100%);
          mask-image: linear-gradient(to right, transparent 0, #000 16px, #000 calc(100% - 16px), transparent 100%);
}
.coping-scroller::-webkit-scrollbar { height: 6px; }
.coping-card {
  flex: 0 0 280px;
  scroll-snap-align: start;
  background: var(--paper);
  color: var(--on-paper);
  border-radius: var(--r-3);
  padding: 16px;
  cursor: pointer;
  border: 1px solid var(--rule-paper);
  box-shadow: var(--shadow-1);
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: transform 0.15s var(--ease), box-shadow 0.15s var(--ease);
  position: relative;
  text-align: left;
}
.coping-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-2); }
.coping-card:focus-visible { outline: 2px solid var(--copper); outline-offset: 3px; }
.coping-card-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--on-paper-mute);
}
.coping-card-star { color: var(--copper); font-size: 14px; }
.coping-card-date { font-family: var(--mono); letter-spacing: 0.05em; }
.coping-card-quote {
  font-size: 15px;
  line-height: 1.45;
  color: var(--on-paper);
  margin: 0;
  font-style: italic;
  /* Clamp long reframes so cards stay uniform height-wise. */
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.coping-card-trigger {
  font-size: 12px;
  color: var(--on-paper-soft);
  line-height: 1.5;
  margin: 0;
}
.coping-card-trigger .muted { color: var(--on-paper-faint); }
.coping-card-foot {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: auto;
}
.coping-card-dist {
  font-size: 10px;
  font-family: var(--mono);
  letter-spacing: 0.04em;
  padding: 2px 8px;
  background: var(--paper-2);
  border-radius: var(--r-full);
  color: var(--on-paper-mute);
}

/* View-scope chips above the search */
.view-chips {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  margin: 0 0 12px;
  padding: 0 16px 4px 16px;
  /* Negative margin pulls the row to the container edge so the mask
     fade reaches the screen edge cleanly. */
  margin-left: -16px;
  margin-right: -16px;
  scrollbar-width: thin;
  /* Mask fades both edges so a clipped chip on either side reads as
     "there's more here, swipe" rather than "this is the end." */
  -webkit-mask-image: linear-gradient(to right, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
          mask-image: linear-gradient(to right, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
}
.view-chips::-webkit-scrollbar { height: 4px; }
.view-chip {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: var(--r-full);
  background: var(--ink-2);
  border: 1px solid var(--rule-ink);
  color: var(--on-ink-soft);
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
  transition: background var(--dur-short) var(--ease), color var(--dur-short) var(--ease), border-color var(--dur-short) var(--ease), transform var(--dur-micro) var(--ease);
}
.view-chip:hover { color: var(--copper); border-color: var(--copper-line); }
.view-chip.active {
  background: var(--copper-soft);
  border-color: var(--copper);
  color: var(--copper);
}
.view-chip-count {
  font-family: var(--mono);
  font-size: 10px;
  padding: 1px 6px;
  background: var(--ink-3);
  border-radius: var(--r-full);
  color: var(--on-ink-mute);
}
.view-chip.active .view-chip-count {
  background: var(--copper);
  color: var(--ink);
}

/* Star/favorite button on each entry card. 36px visible, but the inner
   ::before pseudo expands the tappable area to ~44px without breaking
   the visual rhythm of the meta row. */
.entry-fav-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px; height: 36px;
  border-radius: var(--r-full);
  color: var(--on-paper-faint);
  background: transparent;
  border: 1px solid transparent;
  margin-left: 2px;
  flex-shrink: 0;
  transition: background var(--dur-short) var(--ease), color var(--dur-short) var(--ease), border-color var(--dur-short) var(--ease), transform var(--dur-micro) var(--ease);
  position: relative;
}
.entry-fav-btn::before {
  /* Invisible expanded hit area so the small star at the top corner of a
     card is still comfortable to tap. */
  content: '';
  position: absolute;
  inset: -4px;
}
.entry-fav-btn:active { transform: scale(0.92); }
.entry-fav-btn:hover {
  color: var(--copper);
  background: var(--copper-soft);
  border-color: var(--copper-line);
}
.entry-fav-btn.active {
  color: var(--copper);
  background: rgba(184, 85, 44, 0.10);
  border-color: var(--copper-line);
}
.entry-fav-btn svg { width: 16px; height: 16px; }
.entry-card.is-favorite { background: linear-gradient(to right, rgba(184, 85, 44, 0.03), transparent 40%), var(--paper); }
.entry-card.is-favorite.is-quick { /* favorite takes visual precedence over quick-border */ }

/* Pivot follow-up reflection */
.pivot-followup {
  background: linear-gradient(to right, var(--copper-soft), transparent 80%);
  border-radius: var(--r-3);
  padding: 12px 14px;
  margin-top: 12px;
}
.pivot-followup-label {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
  color: var(--copper);
}
.pivot-followup-when {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.04em;
  text-transform: none;
  color: var(--on-paper-faint);
}
.pivot-reflection-input {
  background: var(--paper);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-2);
  padding: 10px 12px;
  width: 100%;
  resize: vertical;
  /* 16px to dodge iOS focus auto-zoom; see .input baseline. */
  font-size: 16px;
  line-height: 1.55;
  color: var(--on-paper);
}
.pivot-reflection-input:focus {
  outline: 2px solid var(--copper);
  outline-offset: 1px;
  border-color: var(--copper);
}

/* ──────────────────────────────────────────────────────────────────
   ENTRY-KIND BUFFET: mode switcher, free-form / activity / worry
   capture styles + per-kind card variants.
   ────────────────────────────────────────────────────────────────── */

.capture-modes {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 0 16px 12px 16px;
  margin: 0 -16px 16px -16px;
  scrollbar-width: thin;
  -webkit-mask-image: linear-gradient(to right, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
          mask-image: linear-gradient(to right, transparent 0, #000 12px, #000 calc(100% - 12px), transparent 100%);
}
.capture-mode-chip {
  flex: 0 0 auto;
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  padding: 10px 14px;
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-3);
  text-align: left;
  cursor: pointer;
  transition: background var(--dur-short) var(--ease),
              border-color var(--dur-short) var(--ease),
              transform var(--dur-micro) var(--ease);
  min-height: 56px;
}
.capture-mode-chip:hover { border-color: var(--copper-line); }
.capture-mode-chip:active { transform: scale(0.98); }
.capture-mode-chip.active {
  background: rgba(184, 85, 44, 0.08);
  border-color: var(--copper);
}
.capture-mode-label {
  font-family: var(--display);
  font-size: 14px;
  font-weight: 600;
  color: var(--on-paper);
}
.capture-mode-chip.active .capture-mode-label { color: var(--copper-deep); }
.capture-mode-sub {
  font-size: 11px;
  color: var(--on-paper-mute);
  line-height: 1.3;
}

/* Free-form: more relaxed body field, quieter card variant. */
.freeform-body {
  font-family: var(--body);
  font-size: 16px;
  line-height: 1.65;
  min-height: 220px;
}
.entry-card--freeform .entry-card-trigger {
  font-size: 17px;
  font-weight: 500;
}
.entry-card-preview {
  margin: 6px 0 0 0;
  font-size: 13px;
  color: var(--on-paper-mute);
  line-height: 1.55;
}
.entry-kind-tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper);
  font-weight: 600;
}
.freeform-detail-body {
  white-space: pre-wrap;
  font-size: 15px;
  line-height: 1.7;
  color: var(--on-paper);
  margin: 0;
}

/* Activity: category chips, status flag, P/M presentation. */
.activity-cats {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.activity-cat-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-full);
  font-size: 13px;
  cursor: pointer;
  transition: background var(--dur-short) var(--ease),
              border-color var(--dur-short) var(--ease),
              transform var(--dur-micro) var(--ease);
}
.activity-cat-chip:hover { border-color: var(--copper-line); }
.activity-cat-chip:active { transform: scale(0.97); }
.activity-cat-chip.active {
  background: rgba(184, 85, 44, 0.10);
  border-color: var(--copper);
  color: var(--copper-deep);
}
.activity-cat-emoji { font-size: 16px; line-height: 1; }
.activity-cat-label { font-size: 12px; font-weight: 600; }
.entry-card--activity .entry-card-trigger { font-size: 16px; }
.flag-activity {
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--r-full);
  border: 1px solid var(--rule-paper);
}
.flag-activity--planned   { background: var(--paper-3); color: var(--on-paper-mute); }
.flag-activity--due       { background: rgba(184, 85, 44, 0.18); color: var(--copper-deep); border-color: var(--copper-line); }
.flag-activity--completed { background: var(--copper-soft); color: var(--copper-deep); border-color: var(--copper-line); }

/* Worry: parked vs resolved variants. */
.entry-card--worry .entry-card-trigger { font-size: 16px; }
.flag-worry {
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--r-full);
}
.flag-worry--parked              { background: var(--paper-3); color: var(--on-paper-mute); }
.flag-worry--resolved--dissolved { background: var(--copper-soft); color: var(--copper-deep); }
.flag-worry--resolved--escalated { background: rgba(184, 85, 44, 0.18); color: var(--copper-deep); }
.flag-worry--resolved--postponed { background: var(--paper-3); color: var(--on-paper-soft); }
.worry-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}
.worry-window-note {
  margin-top: 16px;
  padding: 12px 14px;
  background: var(--paper-2);
  border-left: 3px solid var(--copper);
  border-radius: var(--r-2);
}
.worry-window-eyebrow {
  display: block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper);
  font-weight: 600;
  margin-bottom: 4px;
}
.worry-window-time {
  display: block;
  font-family: var(--display);
  font-size: 18px;
  font-weight: 500;
  color: var(--on-paper);
}
.worry-window-help {
  margin: 6px 0 0 0;
  font-size: 12px;
  color: var(--on-paper-mute);
}

/* ──────────────────────────────────────────────────────────────────
   EXPLAINER CARDS: plain-English intros for Socratic / Evidence /
   any other step that benefits from "what does this mean."
   ────────────────────────────────────────────────────────────────── */

.explainer-card {
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-left: 3px solid var(--copper);
  border-radius: var(--r-3);
  padding: 14px 16px;
  margin-bottom: 18px;
}
.explainer-card--socratic { margin-top: 20px; }
.explainer-eyebrow {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper-deep);
  font-weight: 600;
  margin-bottom: 8px;
}
.explainer-body {
  font-size: 13px;
  line-height: 1.6;
  color: var(--on-paper-soft);
  margin: 0;
}
.explainer-body strong { color: var(--on-paper); }
.explainer-body em { font-style: italic; color: var(--on-paper); }

/* Quick-capture starter prompts — small chip row that seeds the
   textarea when tapped. Friendly scaffolding without forcing structure. */
.quick-prompts {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  margin-top: 10px;
}
.quick-prompts-label {
  font-size: 11px;
  color: var(--on-paper-mute);
  font-family: var(--mono);
  letter-spacing: 0.04em;
  margin-right: 4px;
}
.quick-prompt-chip {
  display: inline-flex;
  align-items: center;
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  background: var(--paper-2);
  border: 1px dashed var(--rule-paper-2);
  border-radius: var(--r-full);
  color: var(--on-paper-soft);
  cursor: pointer;
  transition: background var(--dur-short) var(--ease),
              color      var(--dur-short) var(--ease),
              border-color var(--dur-short) var(--ease),
              transform  var(--dur-micro) var(--ease);
  /* Touch target — 32px tall + parent gap puts effective tap area at
     ~40px on mobile, comfortable for one-handed taps. */
  min-height: 32px;
}
.quick-prompt-chip:hover {
  border-style: solid;
  border-color: var(--copper);
  color: var(--copper-deep);
  background: rgba(184, 85, 44, 0.06);
}
.quick-prompt-chip:active { transform: scale(0.97); }

/* ──────────────────────────────────────────────────────────────────
   MIND OVER MOOD: Step 2 sectioned multi-thought/multi-mood UI,
   hot-thought cards, three-stage mood arcs, Step 8 outcome screen.
   ────────────────────────────────────────────────────────────────── */

.step2-section {
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px dashed var(--rule-paper);
}
.step2-section:last-of-type { border-bottom: none; padding-bottom: 0; }
.step2-section-head { margin-bottom: 14px; }
.step2-eyebrow {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper);
  font-weight: 600;
  margin-bottom: 6px;
}
.step2-title {
  font-size: 19px;
  margin: 0 0 6px 0;
  color: var(--on-paper);
  letter-spacing: -0.01em;
}
.step2-sub {
  font-size: 13px;
  color: var(--on-paper-mute);
  line-height: 1.55;
  margin: 0 0 14px 0;
}
.step2-sub em { font-style: italic; color: var(--on-paper-soft); }

/* Row list (thoughts / moods cards inside Step 2). */
.row-list { display: flex; flex-direction: column; gap: 12px; }
.row-card {
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-3);
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  transition: border-color 0.15s var(--ease), background 0.15s var(--ease);
}
.row-card.is-hot {
  border-color: var(--copper);
  background: rgba(184, 85, 44, 0.06);
}
.row-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.row-hot {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  font-size: 12px;
  color: var(--on-paper-mute);
  user-select: none;
}
.row-hot input { width: 16px; height: 16px; accent-color: var(--copper); margin: 0; cursor: pointer; }
.row-card.is-hot .row-hot-label { color: var(--copper-deep); font-weight: 600; }
.row-remove {
  width: 28px; height: 28px;
  border-radius: var(--r-full);
  background: transparent;
  color: var(--on-paper-faint);
  border: 1px solid transparent;
  font-size: 18px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background var(--dur-short) var(--ease), color var(--dur-short) var(--ease), border-color var(--dur-short) var(--ease), transform var(--dur-micro) var(--ease);
}
.row-remove:hover {
  color: var(--copper-deep);
  border-color: var(--rule-paper);
  background: var(--paper-3);
}
.row-textarea {
  background: var(--paper);
  border: 1px solid var(--rule-paper);
}
.row-belief {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-top: 2px;
}
.row-belief-label { font-size: 12px; color: var(--on-paper-mute); }
.row-belief-num {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 600;
  color: var(--on-paper);
}
.row-card--mood .field-row-split { flex: 1; }
.intensity-control--row {
  background: var(--paper);
  border-radius: var(--r-2);
  padding: 10px 12px;
}
.row-add {
  margin-top: 12px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 14px;
  background: transparent;
  border: 1px dashed var(--rule-paper-2);
  border-radius: var(--r-2);
  color: var(--copper);
  font-family: var(--body);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--dur-short) var(--ease), color var(--dur-short) var(--ease), border-color var(--dur-short) var(--ease), transform var(--dur-micro) var(--ease);
  width: 100%;
  justify-content: center;
}
.row-add:hover {
  border-color: var(--copper);
  background: rgba(184, 85, 44, 0.05);
  color: var(--copper-deep);
}
.row-add:active { transform: scale(0.99); }

/* Hot-thought "on trial" card at top of Step 3 and Step 5. */
.hot-thought-card {
  background: linear-gradient(to right, rgba(184, 85, 44, 0.08), rgba(184, 85, 44, 0.02));
  border-left: 3px solid var(--copper);
  border-radius: var(--r-3);
  padding: 12px 16px;
  margin-bottom: 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.hot-thought-eyebrow {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper);
  font-weight: 600;
}
.hot-thought-quote {
  font-size: 17px;
  line-height: 1.4;
  margin: 0;
  color: var(--on-paper);
}
.hot-thought-belief {
  font-size: 12px;
  color: var(--on-paper-mute);
  font-family: var(--mono);
}
.hot-thought-belief strong { color: var(--on-paper); }

/* Thought list inside expanded entry details. */
.thought-list {
  list-style: none;
  padding: 0;
  margin: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.thought-list-item {
  background: var(--paper-2);
  border-left: 2px solid transparent;
  border-radius: var(--r-2);
  padding: 8px 12px;
}
.thought-list-item.is-hot {
  border-left-color: var(--copper);
  background: rgba(184, 85, 44, 0.05);
}
.thought-hot-tag { color: var(--copper); }
.thought-belief-line {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--on-paper-mute);
  margin-top: 4px;
}
.thought-belief-line strong { color: var(--on-paper); font-family: var(--mono); }

/* Three-stage mood arc in entry details. */
.mood-arc-list { display: flex; flex-direction: column; gap: 8px; }
.mood-arc {
  background: var(--paper-2);
  border-radius: var(--r-2);
  padding: 8px 12px;
}
.mood-arc-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
}
.mood-arc-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--on-paper);
}
.mood-arc-stages {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--on-paper-soft);
}
.mood-arc-stage {
  display: inline-block;
  padding: 1px 8px;
  background: var(--paper);
  border-radius: var(--r-full);
  font-weight: 600;
  color: var(--on-paper);
}
.mood-arc-sep { color: var(--on-paper-faint); }
.mood-arc-stage-key {
  display: block;
  width: 100%;
  margin-top: 4px;
  font-size: 10px;
  color: var(--on-paper-faint);
  letter-spacing: 0.04em;
}

/* Step 8 outcome screen + CTA on entry cards. */
.outcome-cta {
  margin-top: 12px;
  font-size: 13px;
  padding: 10px 14px;
}
.outcome-done-line {
  margin: 12px 0 0 0;
  font-size: 12px;
  color: var(--copper-deep);
  font-family: var(--mono);
}
.outcome-context {
  background: var(--paper-2);
  border-radius: var(--r-3);
  padding: 14px 16px;
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.outcome-context-row { display: flex; flex-direction: column; gap: 2px; }
.outcome-context-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper-deep);
  font-weight: 600;
}
.outcome-context-text {
  margin: 0;
  font-size: 14px;
  color: var(--on-paper);
  line-height: 1.5;
}
.flag-outcome {
  background: rgba(184, 85, 44, 0.10);
  color: var(--copper-deep);
  border: 1px solid var(--copper-line);
  padding: 2px 8px;
  font-size: 11px;
  font-weight: 600;
  border-radius: var(--r-full);
}

/* ──────────────────────────────────────────────────────────────────
   TIER 1: belief slider, deltas, rerate, quick-capture, safety
   ────────────────────────────────────────────────────────────────── */

.belief-control {
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-3);
  padding: 14px 16px;
}
.belief-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}
.belief-num { font-size: 28px; font-weight: 600; color: var(--on-paper); letter-spacing: -0.02em; }
.belief-num-suffix { font-size: 14px; color: var(--on-paper-mute); margin-left: 2px; font-weight: 500; }
.belief-hint { font-size: 13px; color: var(--on-paper-mute); }
.belief-hint strong { color: var(--on-paper-soft); font-weight: 600; }

.delta-good { color: var(--copper); font-weight: 700; }
.delta-bad  { color: #b8552c; font-weight: 700; }
.delta-flat { color: var(--on-paper-mute); font-weight: 600; }

.rerate-group {
  border-top: 1px dashed var(--rule-paper-2);
  margin-top: 24px;
  padding-top: 20px;
}
.rerate-head { margin-bottom: 16px; }
.rerate-eyebrow {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--copper);
  margin-bottom: 6px;
}
.rerate-title { font-size: 20px; margin: 0 0 6px 0; color: var(--on-paper); }
.rerate-sub { font-size: 13px; color: var(--on-paper-mute); margin: 0; line-height: 1.5; }

/* Entry-card deltas */
.intensity-delta {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-left: 6px;
}
.belief-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  background: rgba(184, 85, 44, 0.10);
  border: 1px solid var(--copper-line);
  border-radius: var(--r-full);
  color: var(--on-paper-soft);
  font-size: 12px;
  font-weight: 500;
}
.belief-mini {
  font-family: var(--mono);
  color: var(--on-paper);
  font-weight: 600;
  font-size: 11px;
}
.delta-tag {
  display: inline-flex;
  align-items: center;
  padding: 1px 6px;
  border-radius: var(--r-full);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.delta-tag.good { background: rgba(184, 85, 44, 0.18); color: var(--copper-deep); }
.delta-tag.flat { background: var(--paper-3); color: var(--on-paper-mute); }

/* Entry-card flag pills (Quick / Sample) */
.entry-meta-flags { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; justify-content: flex-end; margin-left: auto; }
.entry-flag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: var(--r-full);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
  font-family: inherit;
  line-height: 1.4;
}
button.entry-flag {
  cursor: pointer;
  transition: background var(--dur-fast) var(--ease), transform var(--dur-fast) var(--ease);
}
button.entry-flag:hover { transform: translateY(-1px); }
button.entry-flag:active { transform: translateY(0); }
button.entry-flag:focus-visible {
  outline: 2px solid var(--copper);
  outline-offset: 2px;
}
.flag-quick { background: rgba(184, 85, 44, 0.18); color: var(--copper-deep); border: 1px solid var(--copper-line); }
.flag-sample { background: var(--paper-3); color: var(--on-paper-mute); border: 1px solid var(--rule-paper); }
.entry-card.is-quick { border-left: 2px solid var(--copper); }

/* Review rerate block */
.review-rerate {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px dashed var(--rule-paper);
}

/* Patterns: rerate card */
.pattern-card-rerate { display: flex; flex-direction: column; }
.rerate-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 20px;
  margin-top: 8px;
}
.rerate-stat { display: flex; flex-direction: column; gap: 4px; }
.rerate-stat-num {
  font-size: 38px;
  font-weight: 600;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--on-paper);
}
.rerate-stat-num.good { color: var(--copper); }
.rerate-stat-num.bad  { color: var(--on-paper-mute); }
.rerate-stat-suffix { font-size: 14px; color: var(--on-paper-mute); margin-left: 3px; font-weight: 500; }
.rerate-stat-label { font-size: 12px; color: var(--on-paper-mute); line-height: 1.4; }
.rerate-stat-sub { font-size: 11px; color: var(--on-paper-faint); }

/* Topbar quick-capture button */
.icon-pill--quick {
  color: var(--copper);
  border-color: var(--copper-line);
  background: var(--copper-soft);
}
.icon-pill--quick:hover {
  color: var(--copper-light);
  border-color: var(--copper);
  background: var(--copper-glow);
}
.icon-pill--quick svg path { fill: currentColor; stroke: currentColor; }

/* Empty-state safety footer */
.empty-safety {
  margin-top: 28px;
  font-size: 13px;
  color: var(--on-ink-mute);
  line-height: 1.55;
  max-width: 480px;
  margin-left: auto;
  margin-right: auto;
}
.empty-safety strong { color: var(--copper); }

/* Inline button styled like a link, used for "see crisis resources" */
.link-button {
  background: none;
  border: none;
  padding: 0;
  color: var(--copper);
  font: inherit;
  text-decoration: underline;
  text-underline-offset: 2px;
  cursor: pointer;
}
.link-button:hover { color: var(--copper-light); }

/* Modal additions for quick / onboarding / safety */
.modal-body {
  background: var(--paper);
  color: var(--on-paper);
  border-radius: var(--r-3);
  padding: 16px;
  margin: 12px 0;
}
.modal-body .field-label-paper { color: var(--on-paper); }
.modal-body .belief-control { background: var(--paper-2); }
.btn-modal-primary {
  background: var(--copper);
  color: var(--on-paper);
  border: none;
}
.btn-modal-primary:hover { background: var(--copper-light); }

/* Safety section in Reference. Same fix as .ref-section--scope: layer
   the copper wash on top of the inherited paper background instead of
   replacing it, otherwise the card goes transparent against the dark
   body and the crisis-resources text becomes unreadable. */
.ref-section--safety {
  border-left: 3px solid var(--copper);
  background: linear-gradient(to right, rgba(184, 85, 44, 0.06), transparent 60%), var(--paper);
}
.ref-section--safety .ref-section-num {
  background: var(--copper);
  color: var(--paper);
}

/* Safety modal list */
.safety-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
.safety-item {
  background: var(--paper-2);
  border: 1px solid var(--rule-paper);
  border-radius: var(--r-3);
  padding: 10px 14px;
}
.safety-name {
  font-family: var(--display);
  font-size: 15px;
  font-weight: 600;
  color: var(--on-paper);
  margin-bottom: 4px;
}
.safety-country {
  display: inline-block;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--on-paper-mute);
  background: var(--paper-3);
  border-radius: var(--r-full);
  padding: 2px 8px;
  margin-left: 6px;
  font-weight: 500;
}
.safety-detail {
  font-size: 13px;
  color: var(--on-paper-soft);
  line-height: 1.55;
}
.safety-detail strong { color: var(--on-paper); font-family: var(--mono); }

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--ink-3); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-4); }
/* The active @media print block lives further up alongside the Tier 3
   light-theme rules; the older one used to be here and was removed to
   avoid two competing rule sets fighting each other in cascade order. */
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════
// REFERENCE DATA
// ═══════════════════════════════════════════════════════════════════

const DISTORTIONS = [
  { name: "All-or-Nothing Thinking", desc: "Binary extremes.", cues: '"always," "never," "completely," "ruined"' },
  { name: "Overgeneralization", desc: "One event = infinite pattern.", cues: '"every time," "nothing ever"' },
  { name: "Mental Filter", desc: "Fixating on one negative detail, ignoring the rest.", cues: "" },
  { name: "Disqualifying the Positive", desc: "Dismissing good things.", cues: '"that doesn\'t count," "anyone could do that"' },
  { name: "Mind Reading", desc: "Assuming others' thoughts.", cues: '"she probably," "they must think"' },
  { name: "Fortune Telling", desc: "Predicting negatives as certain.", cues: '"this will definitely," "there\'s no way"' },
  { name: "Catastrophizing", desc: "Worst case far beyond probability — also covers magnification (blowing the bad up bigger).", cues: '"what if," disaster language' },
  { name: "Minimization", desc: "Shrinking the good. Burns pairs this with magnification — Catastrophizing covers that side.", cues: '"it\'s not a big deal"' },
  { name: "Emotional Reasoning", desc: "Feelings as proof.", cues: '"I feel like a failure so I must be one"' },
  { name: "Should Statements", desc: "Rigid rules.", cues: '"I should," "I must," "I have to"' },
  { name: "Labeling", desc: "Fixed label from one behavior.", cues: '"I\'m a terrible partner"' },
  { name: "Personalization", desc: "Blame for things not entirely your fault.", cues: "" },
  { name: "Blame", desc: "Assigning all responsibility to others.", cues: "" },
  { name: "Fallacy of Fairness", desc: "Fixation on fairness.", cues: '"it\'s not fair," "I deserve"' },
  { name: "Fallacy of Change", desc: "Expecting others to change for your happiness.", cues: "" },
  { name: "Control Fallacy (external)", desc: "Powerlessness.", cues: '"there\'s nothing I can do"' },
  { name: "Control Fallacy (internal)", desc: "Overresponsibility.", cues: '"it\'s all on me to fix everything"' },
];

// Default Socratic type + reframe method per distortion. Lets step 3
// (the distortion picker) seed steps 4 and 5 automatically so a first-
// time user isn't asked to map jargon-to-jargon mid-flow. The pairings
// come from the "when" fields on SOCRATIC_TYPES and REFRAME_METHODS;
// this constant just encodes them as a lookup so the picker handler
// can apply them. Keys must exactly match a DISTORTIONS[].name; values
// must exactly match a SOCRATIC_TYPES[].type and REFRAME_METHODS[].method.
const DISTORTION_DEFAULTS = {
  "All-or-Nothing Thinking":    { socratic: "Zoom out (pie chart)",    reframe: "Continuum thinking" },
  "Overgeneralization":         { socratic: "Historical test",         reframe: "Continuum thinking" },
  "Mental Filter":              { socratic: "Zoom out (pie chart)",    reframe: "Coping/encouraging thought" },
  "Disqualifying the Positive": { socratic: "Evidence examination",    reframe: "Coping/encouraging thought" },
  "Mind Reading":               { socratic: "Alternative explanation", reframe: "Behavioral experiment" },
  "Fortune Telling":            { socratic: "Probability testing",     reframe: "Realism" },
  "Catastrophizing":            { socratic: "Decatastrophizing",       reframe: "Realism" },
  "Minimization":               { socratic: "Zoom out (pie chart)",    reframe: "Coping/encouraging thought" },
  "Emotional Reasoning":        { socratic: "Evidence examination",    reframe: "Realism" },
  "Should Statements":          { socratic: "Cost-benefit",            reframe: "Continuum thinking" },
  "Labeling":                   { socratic: "Double standard",         reframe: "Compassionate reattribution" },
  "Personalization":            { socratic: "Alternative explanation", reframe: "Compassionate reattribution" },
  "Blame":                      { socratic: "Alternative explanation", reframe: "Compassionate reattribution" },
  "Fallacy of Fairness":        { socratic: "Cost-benefit",            reframe: "Realism" },
  "Fallacy of Change":          { socratic: "Cost-benefit",            reframe: "Behavioral experiment" },
  "Control Fallacy (external)": { socratic: "Evidence examination",    reframe: "Behavioral experiment" },
  "Control Fallacy (internal)": { socratic: "Double standard",         reframe: "Compassionate reattribution" },
};

const COMMON_PAIRS = [
  "Catastrophizing + Fortune Telling",
  "Mind Reading + Personalization",
  "All-or-Nothing + Should Statements",
  "Emotional Reasoning + Labeling",
];

const EMOTION_FAMILIES = {
  Anger: ["irritated", "frustrated", "resentful", "bitter", "furious", "hostile", "contemptuous"],
  Anxiety: ["nervous", "worried", "apprehensive", "panicked", "dread", "hypervigilant"],
  Sadness: ["disappointed", "hurt", "dejected", "grief", "hopeless", "lonely", "abandoned"],
  Shame: ["embarrassed", "humiliated", "inadequate", "exposed", "self-conscious"],
  Guilt: ["remorseful", "regretful", "blameworthy", "self-reproachful"],
  Fear: ["scared", "threatened", "insecure", "vulnerable", "helpless"],
  Jealousy: ["envious", "possessive", "excluded", "inferior"],
  Disgust: ["repulsed", "contemptuous", "revolted"],
};

const INTENSITY_BANDS = [
  { max: 20, label: "Mild",     signals: "Matter-of-fact tone, no vocal tension" },
  { max: 40, label: "Moderate", signals: "Slight edge, lingering on the topic" },
  { max: 60, label: "Strong",   signals: "Repeating the issue, vocal frustration" },
  { max: 80, label: "High",     signals: "Raised voice, spiraling, hard to drop" },
  { max: 100, label: "Severe",  signals: "Shutdown, crying, yelling, physical distress" },
];

const BODY_REGIONS = [
  { region: "Head",       examples: "headache, pressure behind eyes, foggy thinking" },
  { region: "Throat/Jaw", examples: "lump in throat, jaw clenching, voice tightening" },
  { region: "Chest",      examples: "tightness, racing heart, heaviness, shortness of breath" },
  { region: "Stomach",    examples: "knot, nausea, butterflies, sinking feeling" },
  { region: "Muscles",    examples: "tension in shoulders/neck/back, restlessness" },
  { region: "Skin",       examples: "flushing, sweating, tingling, numbness" },
  { region: "Energy",     examples: "fatigue, heaviness, jittery, unable to sit still" },
];

const SOCRATIC_TYPES = [
  { type: "Evidence examination",   when: "Thought stated as fact without proof",        template: "What evidence do I actually have that [thought] is true?" },
  { type: "Alternative explanation", when: "Locked into one interpretation",             template: "Is there another way to explain why [person] did that?" },
  { type: "Probability testing",    when: "Catastrophizing / fortune telling",           template: "How likely is [worst case] on a scale of 0–100%?" },
  { type: "Historical test",        when: "Treating this as a pattern",                  template: "How many times has [feared outcome] actually happened vs not?" },
  { type: "Double standard",        when: "Harsher on self than on others",              template: "If a friend told me they did this, what would I say?" },
  { type: "Decatastrophizing",      when: "Worst-case thinking",                         template: "If the worst case happened, what would I realistically do?" },
  { type: "Cost-benefit",           when: "Should statements / rigid rules",             template: "What does holding this belief cost me vs give me?" },
  { type: "Zoom out (pie chart)",   when: "Tunnel vision / mental filter / sole-blame",  template: "If I drew a pie chart of every factor that contributed, how big would my slice actually be? What else fills the circle?" },
];

const REFRAME_METHODS = [
  { method: "Coping/encouraging thought",  when: "Self-criticism about ability", does: "A kinder, more accurate line you can actually use as encouragement",
    template: "I haven't figured this out yet, and that's not the same as never being able to. One rough attempt isn't the verdict." },
  { method: "Realism",                     when: "Catastrophizing",              does: "Replaces extreme prediction with most probable outcome",

const STORAGE_KEY = "reframe-journal-v1";
const DRAFT_KEY   = "reframe-journal-draft-v1";
const ONBOARDED_KEY = "reframe-onboarded-v1";
const SETTINGS_KEY = "reframe-settings-v1";
const PIN_KEY = "reframe-pin-hash-v1";
const UNLOCK_KEY = "reframe-unlocked";   // sessionStorage; cleared when tab closes

// PIN-based soft lock. Honest about the threat model: this gates the UI so
// casual snooping on a shared device can't read the journal, but the data
// itself isn't encrypted — anyone who knows where localStorage lives could
// still extract it via devtools. We deliberately do not derive an encryption
// key from the PIN: if the user forgets it, hard-encrypted data would be
// unrecoverable, and losing months of CBT work is a worse harm than soft
// privacy is a benefit. This is documented in the Settings → Privacy help.
//
// PIN storage format. Two shapes exist:
//   v1 (legacy): plain hex string — sha256(pin). Vulnerable to instant
//        brute-force (4-digit PIN = 10k SHA-256 hashes ≈ <1s on a phone).
//        Migrated to v2 on next successful unlock.
//   v2: JSON {v: 2, salt, hash, iterations} where hash = PBKDF2-SHA-256.
//        100k iterations + 16-byte random salt per-device. Brute-force
//        cost climbs from microseconds to tens of seconds.
const PBKDF2_ITERATIONS = 100000;
const PIN_LOCKOUT_KEY = "reframe-pin-lockout";  // sessionStorage
const _toHex = (buf) => Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
const _fromHex = (hex) => {
  const out = new Uint8Array(hex.length / 2);
  for (let i = 0; i < out.length; i++) out[i] = parseInt(hex.substr(i * 2, 2), 16);
  return out;
};

async function _legacyHashPin(pin) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(String(pin)));
  return _toHex(buf);
}

async function _pbkdf2Pin(pin, saltBytes) {
  const key = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(String(pin)), { name: "PBKDF2" }, false, ["deriveBits"]
  );
  const bits = await crypto.subtle.deriveBits(
    { name: "PBKDF2", salt: saltBytes, iterations: PBKDF2_ITERATIONS, hash: "SHA-256" },
    key, 256
  );
  return _toHex(bits);
}

function _readStoredPin() {
  const raw = localStorage.getItem(PIN_KEY);
  if (!raw) return null;
  // Legacy v1: bare 64-char hex string (sha256 hex digest).
  if (/^[0-9a-f]{64}$/i.test(raw)) return { v: 1, hash: raw };
  try {
    const o = JSON.parse(raw);
    if (o && o.v === 2 && o.salt && o.hash) return o;
  } catch (_) {}
  return null;
}

function hasPin() { return !!localStorage.getItem(PIN_KEY); }

async function verifyPin(pin) {
  const stored = _readStoredPin();
  if (!stored) return false;
  let ok = false;
  if (stored.v === 1) {
    ok = (await _legacyHashPin(pin)) === stored.hash;
    // Opportunistic migration on first successful unlock: upgrade the
    // record to the salted/iterated v2 format so the next session
    // doesn't fall back to the weak hash.
    if (ok) try { await setStoredPin(pin); } catch (_) {}
  } else {
    const computed = await _pbkdf2Pin(pin, _fromHex(stored.salt));
    ok = computed === stored.hash;
  }
  return ok;
}

async function setStoredPin(pin) {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const hash = await _pbkdf2Pin(pin, salt);
  localStorage.setItem(PIN_KEY, JSON.stringify({
    v: 2, salt: _toHex(salt), hash, iterations: PBKDF2_ITERATIONS,
  }));
  sessionStorage.setItem(UNLOCK_KEY, "1");
  _clearLockout();
}

function clearStoredPin() {
  localStorage.removeItem(PIN_KEY);
  sessionStorage.removeItem(UNLOCK_KEY);
  _clearLockout();
}
function isUnlocked() { return sessionStorage.getItem(UNLOCK_KEY) === "1"; }
function markUnlocked() { sessionStorage.setItem(UNLOCK_KEY, "1"); _clearLockout(); }
function markLocked() { sessionStorage.removeItem(UNLOCK_KEY); }

// Lockout: after 5 failed attempts, refuse verifyPin attempts for an
// exponentially-growing window (2s, 4s, 8s, ... capped at 5 min). State
// lives in sessionStorage so it resets when the tab closes — a determined
// attacker could close + reopen, but the cap on the legitimate flow's
// frustration matters more than a bullet-proof block in this threat model.
function _readLockout() {
  try {
    const raw = sessionStorage.getItem(PIN_LOCKOUT_KEY);
    if (!raw) return { attempts: 0, until: 0 };
    const o = JSON.parse(raw);
    return { attempts: o.attempts || 0, until: o.until || 0 };
  } catch (_) { return { attempts: 0, until: 0 }; }
}
function _writeLockout(o) {
  try { sessionStorage.setItem(PIN_LOCKOUT_KEY, JSON.stringify(o)); } catch (_) {}
}
function _clearLockout() { try { sessionStorage.removeItem(PIN_LOCKOUT_KEY); } catch (_) {} }
function pinLockoutMsLeft() {
  const { until } = _readLockout();
  return Math.max(0, until - Date.now());
}
function recordPinFailure() {
  const { attempts } = _readLockout();
  const next = attempts + 1;
  let until = 0;
  if (next >= 5) {
    const sec = Math.min(300, Math.pow(2, next - 4));  // 2,4,8,...,300
    until = Date.now() + sec * 1000;
  }
  _writeLockout({ attempts: next, until });
}

const REMINDER_MS = {

// Fields added after v1 shipped. Existing JSON exports won't carry them, so
// we normalize on read to a stable shape. null (not 0) means "not rated" —
// that distinction matters for the before/after delta display.
// Schema v2 (Mind Over Mood–aligned): moods and thoughts are arrays so a
// single triggering moment can carry the multiple feelings and competing
// automatic thoughts canonical thought-records capture. One thought is
// marked `isHot` — that's the one Steps 4 and 5 challenge and reframe.
// Legacy v1 entries (single emotion + single automaticThought) are
// converted on read; the v1 scalar fields are dropped from the output so
// we never have stale duplicates to keep in sync.
// Valid entry kinds. The default — for backward-read and new captures —
// is the full Mind Over Mood thought record. Each non-default kind has
// its own narrower field set, captured by its own UI flow. Fields not
// relevant to a kind stay at their default ("" / 0 / null / false) so
// renderers can simply check kind first and pick the relevant fields.
const ENTRY_KINDS = ["thought-record", "freeform", "activity", "worry"];

// PR 6: clinical-terminology rename map. Saved entries written before the
// rename keep their old labels in localStorage; remap on read so dropdowns
// can re-select them and reference views show the new wording. Empty / new
// values pass through unchanged.
const DISTORTION_RENAME = { "Mental Filtering": "Mental Filter" };
const SOCRATIC_RENAME = {
  "Historical testing": "Historical test",
  "Perspective broadening": "Zoom out (pie chart)",
};
const REFRAME_RENAME = {
  "Growth-Oriented": "Coping/encouraging thought",
  "vs. Absolutes": "Continuum thinking",
};

function normalizeEntry(e) {
  const kind = (ENTRY_KINDS.includes(e && e.kind)) ? e.kind : "thought-record";
  const out = {
    // Mint an id if the source object lacks one. Hand-edited or stripped
    // backups can omit it; without a fresh id the dedupe-by-id Map in
    // processImportFile would collapse every such entry into one.
    id: e.id || newId(),
    kind,
    createdAt: e.createdAt || "",
    updatedAt: e.updatedAt || undefined,

    trigger: e.trigger || "",

    moods: Array.isArray(e.moods) ? e.moods.map(normalizeMood) : [],
    thoughts: Array.isArray(e.thoughts) ? e.thoughts.map(normalizeThought) : [],

    bodyCheck: e.bodyCheck || "",
    bodyInferred: !!e.bodyInferred,

    distortions: Array.isArray(e.distortions) ? e.distortions.map(n => DISTORTION_RENAME[n] || n) : [],
    distortionNote: e.distortionNote || "",
    // "I looked at the thought and it actually feels accurate to me" — a
    // valid CBT outcome that the workflow needs to permit explicitly,
    // otherwise users in real grief / valid distress get nudged into
    // pathologizing healthy reactions.
    thoughtsAccurate: !!e.thoughtsAccurate,

    evidenceFor: e.evidenceFor || "",
    evidenceAgainst: e.evidenceAgainst || "",
    socraticType: SOCRATIC_RENAME[e.socraticType] || e.socraticType || "",
    socraticQuestion: e.socraticQuestion || "",

    reframeMethod: REFRAME_RENAME[e.reframeMethod] || e.reframeMethod || "",
    newThought: e.newThought || "",
    // Padesky re-rates belief in both the original hot thought (lives on the
    // thought row as beliefAfter) and the NEW balanced thought. We add the
    // latter as a separate scalar so it survives multi-thought edits.
    newThoughtBelief: typeof e.newThoughtBelief === "number" ? e.newThoughtBelief : null,

    pivot: e.pivot || "",
    pivotDone: !!e.pivotDone,
    pivotDoneAt: e.pivotDoneAt || "",
    pivotReflection: e.pivotReflection || "",
    outcomeRecorded: !!e.outcomeRecorded,

    // Free-form (kind: "freeform") fields — title is optional, body is the
    // long-form text. Moods + distortions remain reusable on free-form too.
    body: e.body || "",

    // Behavioral-activation (kind: "activity") fields. Pleasure + Mastery
    // are rated 0–10 — the canonical Lejuez scale. predicted* are set when
    // planning; actual* + completedAt are set on log-completion.
    category: e.category || "",          // connection|movement|creation|self-care|chore|rest|other
    plannedFor: e.plannedFor || "",      // ISO datetime
    predictedP: typeof e.predictedP === "number" ? e.predictedP : null,
    predictedM: typeof e.predictedM === "number" ? e.predictedM : null,
    completedAt: e.completedAt || "",
    actualP: typeof e.actualP === "number" ? e.actualP : null,
    actualM: typeof e.actualM === "number" ? e.actualM : null,
    activityNotes: e.activityNotes || "",

    // Worry (kind: "worry") fields. urgency 0–10. resolution null until the
    // worry-window pass; "dissolved" means user marked it gone without
    // further work, "escalated" means it got converted to a thought-record,
    // "postponed" pushes scheduledFor forward another window.
    worryText: e.worryText || "",
    urgency: typeof e.urgency === "number" ? e.urgency : null,
    parkedAt: e.parkedAt || "",
    scheduledFor: e.scheduledFor || "",
    resolution: e.resolution || null,
    resolvedAt: e.resolvedAt || "",
    linkedEntryId: e.linkedEntryId || "",

    isQuick: !!e.isQuick,
    isSample: !!e.isSample,
    isFavorite: !!e.isFavorite,
  };

  // Migrate v1 single-emotion/single-thought entries. Only applies to
  // thought-record-shaped entries; free-form/activity/worry never had v1.
  if (kind === "thought-record") {
    if (out.moods.length === 0 && (e.emotionFamily || typeof e.emotionIntensity === "number")) {
      out.moods.push(normalizeMood({
        family: e.emotionFamily,
        variant: e.emotionVariant,
        intensity: e.emotionIntensity,
        estimated: e.emotionEstimated,
        intensityAfterReframe: e.emotionIntensityAfter,
      }));
    }
    if (out.thoughts.length === 0 && (e.automaticThought || typeof e.beliefBefore === "number")) {
      out.thoughts.push(normalizeThought({
        text: e.automaticThought,
        beliefBefore: e.beliefBefore,
        beliefAfter: e.beliefAfter,
        isHot: true,
      }));
    }
    // Guarantee at least one thought is hot.
    if (out.thoughts.length > 0 && !out.thoughts.some(t => t.isHot)) {
      out.thoughts[0].isHot = true;
    }
    // hotThought() and several renderers assume thought-records have ≥1
    // thought. Hand-edited or partially-saved backups can violate that;
    // mint a placeholder so the entry is at least viewable.
    if (out.thoughts.length === 0) {
      out.thoughts.push(normalizeThought({ isHot: true }));
    }
  }
  return out;
}

function normalizeMood(m) {
  m = m || {};
  return {
    id: m.id || newId(),
    family: m.family || "",
    variant: m.variant || "",
    intensity: typeof m.intensity === "number" ? m.intensity : 40,
    estimated: !!m.estimated,
    intensityAfterReframe: typeof m.intensityAfterReframe === "number" ? m.intensityAfterReframe : null,
    intensityAfterPivot:   typeof m.intensityAfterPivot   === "number" ? m.intensityAfterPivot   : null,
  };
}
function normalizeThought(t) {
  t = t || {};
  return {
    id: t.id || newId(),
    text: t.text || "",
    beliefBefore: typeof t.beliefBefore === "number" ? t.beliefBefore : null,
    beliefAfter:  typeof t.beliefAfter  === "number" ? t.beliefAfter  : null,
    isHot: !!t.isHot,
  };
}

// Convenience accessors used across renderers and exporters. Centralizing
// the "hot thought" lookup keeps the rest of the code from re-implementing
// the search and lets us swap selection rules in one place.
function hotThought(entry) {
  const list = (entry && entry.thoughts) || [];
  return list.find(t => t.isHot) || list[0] || null;
}

function loadEntries() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
    return Array.isArray(raw) ? raw.map(normalizeEntry) : [];
  }
  catch { return []; }
}
function saveEntries(arr) { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); }
function loadDraft() {
  try {
    const raw = JSON.parse(localStorage.getItem(DRAFT_KEY) || "null");

// Underlying synchronous persistence — called from saveDraft on a 300ms
// trailing edge, and flushed eagerly on step transitions, modal close,
// and beforeunload. Keystroke-frequency writes were re-serializing the
// whole draft on every input event on long-form fields.
function _saveDraftNow(d) {
  if (hasDraftContent(d)) localStorage.setItem(DRAFT_KEY, JSON.stringify(d));
  else localStorage.removeItem(DRAFT_KEY);
}
let _saveDraftTimer = null;
let _pendingDraft = null;
function saveDraft(d) {
  _pendingDraft = d;
  if (_saveDraftTimer !== null) return;
  _saveDraftTimer = setTimeout(() => {
    _saveDraftTimer = null;
    if (_pendingDraft) _saveDraftNow(_pendingDraft);
    _pendingDraft = null;
  }, 300);
}
function flushDraft() {
  if (_saveDraftTimer !== null) { clearTimeout(_saveDraftTimer); _saveDraftTimer = null; }
  if (_pendingDraft) { _saveDraftNow(_pendingDraft); _pendingDraft = null; }
}
window.addEventListener("beforeunload", flushDraft);
function clearDraft() {
  // Drop any pending debounced write so it can't resurrect cleared data.
  if (_saveDraftTimer !== null) { clearTimeout(_saveDraftTimer); _saveDraftTimer = null; }
  _pendingDraft = null;
  localStorage.removeItem(DRAFT_KEY);
}

const newId = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);

function clampDate(iso) {
  const t = Date.parse(iso);

  return t > now + 60000 ? new Date(now).toISOString() : iso;
}
const band = n => INTENSITY_BANDS.find(b => n <= b.max) || INTENSITY_BANDS[4];

function emptyEntry() {

function emptyFreeform() {

    thoughts: [],    // no thoughts captured

function emptyActivity() {

function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  // Guard against corrupted timestamps (hand-edited backups, half-
  // written entries) — printing the literal "Invalid Date" string in
  // the UI is worse than rendering nothing.
  if (isNaN(d.getTime())) return "";
  // `undefined` locale = use the browser's default so a German user sees
  // "5. Nov. 2025" and an en-US user still sees "Nov 5, 2025".
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}
function fmtTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  return d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
}
function fmtDateTime(iso) { return fmtDate(iso) + " · " + fmtTime(iso); }

function startOfDay(d) {
  const x = new Date(d);
  x.setHours(0, 0, 0, 0);
  return x;
}
function daysBetween(a, b) {
  return Math.round((startOfDay(a) - startOfDay(b)) / 86400000);
}
function dateGroupLabel(iso) {
  const days = daysBetween(new Date(), new Date(iso));
  if (days === 0) return "Today";
  if (days === 1) return "Yesterday";
  if (days < 7) return "This week";
  if (days < 14) return "Last week";
  if (days < 30) return "This month";
  if (days < 90) return "Last 3 months";
  return "Earlier";
}

  if (e.kind === "activity") return activityToMd(e, idx);

function freeformToMd(e, idx) {
  const L = [];
  L.push("---", "", "### Free write " + (idx + 1), "");
  if (e.trigger) L.push("**" + e.trigger + "**", "");
  if (e.createdAt) L.push("*" + fmtDateTime(e.createdAt) + "*", "");
