<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<!-- Content Security Policy. App is self-hosted plus Google Fonts. All JS is
     external (app.js + js/pwa.js), so script-src is strict 'self' with no
     'unsafe-inline'. style-src still needs 'unsafe-inline' because the
     rendered templates carry inline style="..." attributes; the bulk of the
     CSS lives in the external styles.css. data: in img-src allows inline SVG
     icons; blob: in img-src and manifest-src covers the PWA inline manifest
     path that js/pwa.js uses on file:// launches. The peerjs.com + stun:
     entries in connect-src are required only for the optional P2P sync
     feature (js/sync.js): PeerJS brokers the WebRTC handshake over
     wss://*.peerjs.com and ICE gathering uses public STUN servers. Entry
     data still flows device-to-device, never through a server. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://*.peerjs.com wss://*.peerjs.com stun: stuns:; manifest-src 'self' blob:; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<!-- Two media-scoped theme-color metas so the browser picks the right
     status-bar / tab-strip color at first paint, before applyTheme()
     runs. The third (un-scoped) meta is owned by applyTheme() and added
     dynamically only when the user picks an explicit Light/Dark
     override, so it can win over the media-scoped pair via "last
     declared in head" precedence. -->
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5efe6">
<meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#1a1715">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rephrame">
<title>Rephrame — A CBT Journal</title>
<meta name="description" content="A private, offline-first CBT journal. Capture thoughts, identify distortions, reframe them. All data stays on your device.">

<!-- PWA manifest + icons. IDs let js/pwa.js swap to inline blob URLs when
     the app is opened from file:// (where external manifest fetch fails). -->
<link rel="manifest" href="manifest.json" id="pwa-manifest">
<link rel="apple-touch-icon" href="icons/icon-192.svg" id="pwa-apple-icon">
<link rel="icon" type="image/svg+xml" href="icons/icon-small.svg" id="pwa-favicon">
<link rel="icon" type="image/svg+xml" sizes="192x192" href="icons/icon-192.svg">
<link rel="icon" type="image/svg+xml" sizes="512x512" href="icons/icon-512.svg">

<!-- PWA bootstrap: service worker registration + install prompt + file:// fallback -->
<script src="js/pwa.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body class="is-booting">
<div class="app">
  <div class="container">
    <header class="topbar">
      <div class="brand-row">
        <div class="brand">
          <span class="brand-mark">r</span>
          <div>
            <div class="brand-name">Rephrame</div>
            <div class="brand-sub">A CBT Journal</div>
          </div>
        </div>
        <div class="topbar-actions">
          <button id="installBtn" class="install-pill" type="button" aria-label="Install Rephrame as an app" hidden>＋ Install</button>
          <button class="icon-pill icon-pill--quick" data-action="open-quick" aria-label="Quick capture for distressing moments" title="Quick capture — name what's there in under a minute">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M13 2L4 13h6l-1 9 9-12h-6z"/>
            </svg>
          </button>
          <button class="icon-pill" data-action="open-settings" aria-label="Settings, backup, theme" title="Settings — theme, reminders, backup &amp; restore">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>
  </div>

  <main>
    <div class="container">
      <div id="view"></div>
    </div>
  </main>

  <nav class="bottom-nav" aria-label="Primary">
    <div class="bottom-nav-inner">
      <button class="nav-item" data-nav="journal">
        <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h11a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4z"/>
          <path d="M4 4v16"/>
          <path d="M8 8h6M8 12h6M8 16h4"/>
        </svg>
        <span class="nav-label">Journal</span>
      </button>
      <button class="nav-item" data-nav="capture">
        <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4v14M4 11h14"/>
        </svg>
        <span class="nav-label">Capture</span>
      </button>
      <button class="nav-item" data-nav="patterns">
        <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 18V10M9 18V6M14 18v-5M19 18V8"/>
          <path d="M3 18h17"/>
        </svg>
        <span class="nav-label">Patterns</span>
      </button>
      <button class="nav-item" data-nav="reference">
        <svg viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4v14a2 2 0 0 0 2 2h12V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2z"/>
          <path d="M8 8h6M8 12h6"/>
        </svg>
        <span class="nav-label">Reference</span>
      </button>
    </div>
  </nav>
</div>

<input type="file" id="import-file" accept=".json,application/json" class="file-input">
<div class="toast-stack" id="toasts" role="status" aria-live="polite" aria-atomic="false"></div>
<div id="modal-root"></div>

<script src="app.js"></script>
<script src="js/sync.js"></script>

</body>
</html>
